<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的歷史訂單 | GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
    <style>
        [ng\:cloak], [ng-cloak], .ng-cloak { display: none !important; }
        body { background-color: #f8f9fa; }
    </style>
</head>
<body ng-controller="MainCtrl" ng-cloak>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏋️ GymSystem 會員中心</span>
            <div class="d-flex align-items-center">
                <a href="profile.html" class="btn btn-outline-light btn-sm me-2">回個人資料</a>
                <a href="mall.html" class="btn btn-info btn-sm me-3">繼續逛商城</a>
                <span class="text-warning me-3 fw-bold">歡迎回來, {{ currentUser.name }}</span>
                <button class="btn btn-danger btn-sm" ng-click="logout()">登出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 fw-bold">我的訂單紀錄</h2>
        
        <table class="table table-striped table-hover bg-white shadow-sm rounded overflow-hidden">
            <thead class="table-dark">
                <tr>
                    <th>訂單編號</th>
                    <th>下單時間</th>
                    <th>總金額</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="order-list">
                <tr>
                    <td colspan="5" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">努力載入訂單中...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="modalTitle">訂單明細</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <table class="table table-bordered text-center mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>商品名稱</th>
                                <th>單價</th>
                                <th>數量</th>
                                <th>小計</th>
                            </tr>
                        </thead>
                        <tbody id="modal-detail-list">
                            </tbody>
                    </table>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let productDictionary = {};
        let orderModal = null; // 用來存放 Bootstrap Modal 實體

        window.onload = function() {
            // 1. 權限檢查：攔截未登入的訪客
            const user = JSON.parse(localStorage.getItem('gymUser'));
            if (!user || !user.memberId) {
                alert("請先登入後查看訂單！");
                window.location.href = "login.html";
                return;
            }

            // 初始化 Modal 實體 (取代舊版的 jQuery 寫法)
            orderModal = new bootstrap.Modal(document.getElementById('orderDetailModal'));

            // 2. 抓取商品字典 (保留同學的心血)
            fetch('/api/products')
                .then(res => res.json())
                .then(products => {
                    products.forEach(p => {
                        productDictionary[p.productId] = p.pname; 
                    });
                    
                    // 3. 字典建立好之後，傳入真實的 memberId 去抓訂單
                    fetchOrderHistory(user.memberId);
                })
                .catch(err => console.error("無法取得商品清單:", err));
        };

        // 取得歷史訂單
        function fetchOrderHistory(memberId) {
            const orderList = document.getElementById('order-list');

            // 👉 改成動態 memberId
            fetch(`/api/orders/member/${memberId}`)
                .then(response => response.json())
                .then(orders => {
                    orderList.innerHTML = ''; 

                    if(orders.length === 0) {
                        orderList.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">目前沒有訂單喔！去商城逛逛吧！</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        let statusHtml = order.status;
                        if (order.status === 'processing') statusHtml = '<span class="badge bg-warning text-dark">處理中</span>';
                        if (order.status === 'shipped') statusHtml = '<span class="badge bg-success">已出貨</span>';

                        let formattedDate = order.orderDate ? order.orderDate.substring(0, 19).replace('T', ' ') : '無日期';

                        const rowHtml = `
                            <tr>
                                <td class="fw-bold"># ${order.orderId}</td>
                                <td>${formattedDate}</td>
                                <td class="text-danger fw-bold">NT$ ${order.totalAmount}</td>
                                <td>${statusHtml}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="viewDetails(${order.orderId})">查看明細</button>
                                </td>
                            </tr>
                        `;
                        orderList.innerHTML += rowHtml;
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // 查看明細
        function viewDetails(orderId) {
            document.getElementById('modalTitle').innerText = '訂單 # ' + orderId + ' 的商品明細';
            
            const detailList = document.getElementById('modal-detail-list');
            detailList.innerHTML = '<tr><td colspan="4" class="text-center py-3"><div class="spinner-border text-info spinner-border-sm" role="status"></div> 努力抓取明細中...</td></tr>';
            
            // 彈出視窗
            orderModal.show();

            // 抓取 API 明細
            fetch(`/api/orders/${orderId}/details`)
                .then(response => response.json())
                .then(details => {
                    detailList.innerHTML = ''; 

                    if(details.length === 0) {
                        detailList.innerHTML = '<tr><td colspan="4" class="text-center py-3 text-muted">查無明細資料</td></tr>';
                        return;
                    }

                    details.forEach(item => {
                        const subtotal = item.unitPrice * item.quantity;
                        const productName = productDictionary[item.productId] || ('未知商品 (ID:' + item.productId + ')');

                        const rowHtml = `
                            <tr>
                                <td>${productName}</td>
                                <td>NT$ ${item.unitPrice}</td>
                                <td>${item.quantity}</td>
                                <td class="text-danger fw-bold">NT$ ${subtotal}</td>
                            </tr>
                        `;
                        detailList.innerHTML += rowHtml;
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    detailList.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-3">載入明細失敗</td></tr>';
                });
        }
    </script>
</body>
</html>
