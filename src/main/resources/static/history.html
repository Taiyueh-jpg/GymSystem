<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的歷史訂單</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <span class="navbar-brand mb-0 h1">🏋️ GymSystem 會員中心</span>
        <a href="/product/mall" class="btn btn-outline-light btn-sm">回商城逛逛</a>
    </nav>

    <div class="container">
        <h2 class="mb-4">我的訂單紀錄</h2>
        
        <table class="table table-striped table-hover bg-white shadow-sm">
            <thead class="thead-dark">
                <tr>
                    <th>訂單編號</th>
                    <th>下單時間</th>
                    <th>總金額</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="order-list">
                <tr>
                    <td colspan="5" class="text-center">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p>努力載入訂單中...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">訂單明細</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <table class="table table-bordered text-center">
                        <thead class="thead-light">
                            <tr>
                                <th>商品名稱</th>
                                <th>單價</th>
                                <th>數量</th>
                                <th>小計</th>
                            </tr>
                        </thead>
                        <tbody id="modal-detail-list">
                            </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 準備一個「翻譯字典」，用來把商品 ID 變成商品名稱
        let productDictionary = {};

        window.onload = function() {
            // 1. 先偷偷去抓信穎的商品 API，建立翻譯字典
            fetch('/api/products')
                .then(res => res.json())
                .then(products => {
                    products.forEach(p => {
                        productDictionary[p.productId] = p.pname; // 例如：字典裡的 1 號是高蛋白乳清
                    });
                    
                    // 字典建立好之後，再去抓訂單列表
                    fetchOrderHistory();
                });
        };

        // 抓取歷史訂單的函數 (您剛剛已經成功跑出來的)
        function fetchOrderHistory() {
            fetch('/api/orders/member/1')
                .then(response => response.json())
                .then(orders => {
                    const orderList = document.getElementById('order-list');
                    orderList.innerHTML = ''; 

                    if(orders.length === 0) {
                        orderList.innerHTML = '<tr><td colspan="5" class="text-center">目前沒有訂單喔！</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        let statusHtml = order.status;
                        if (order.status === 'paid') statusHtml = '<span class="badge badge-success">已付款</span>';
                        if (order.status === 'shipped') statusHtml = '<span class="badge badge-info">已出貨</span>';

                        let formattedDate = order.orderDate ? order.orderDate.substring(0, 19).replace('T', ' ') : '無日期';

                        const rowHtml = `
                            <tr>
                                <td># ${order.orderId}</td>
                                <td>${formattedDate}</td>
                                <td class="text-danger font-weight-bold">NT$ ${order.totalAmount}</td>
                                <td>${statusHtml}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="viewDetails(${order.orderId})">查看明細</button>
                                </td>
                            </tr>
                        `;
                        orderList.innerHTML += rowHtml;
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // ==========================================
        // 新增：查看明細按鈕的真正邏輯
        // ==========================================
        function viewDetails(orderId) {
            // 1. 更改 Modal 標題
            document.getElementById('modalTitle').innerText = '訂單 # ' + orderId + ' 的商品明細';

            // 2. 顯示「載入中」畫面並把 Modal 彈出來
            const detailList = document.getElementById('modal-detail-list');
            detailList.innerHTML = '<tr><td colspan="4" class="text-center">努力抓取明細中...</td></tr>';
            $('#orderDetailModal').modal('show'); // jQuery 語法，召喚視窗！

            // 3. 去您的後端 API 抓這筆訂單的明細！
            fetch('/api/orders/' + orderId + '/details')
                .then(response => response.json())
                .then(details => {
                    detailList.innerHTML = ''; // 清空載入中字眼

                    if(details.length === 0) {
                        detailList.innerHTML = '<tr><td colspan="4" class="text-center">查無明細</td></tr>';
                        return;
                    }

                    // 把每一筆明細畫成表格
                    details.forEach(item => {
                        const subtotal = item.unitPrice * item.quantity;
                        
                        // 使用剛剛建好的翻譯字典，如果找不到名稱，就顯示 ID
                        const productName = productDictionary[item.productId] || ('未知商品 (ID:' + item.productId + ')');

                        const rowHtml = `
                            <tr>
                                <td>${productName}</td>
                                <td>NT$ ${item.unitPrice}</td>
                                <td>${item.quantity}</td>
                                <td class="text-danger font-weight-bold">NT$ ${subtotal}</td>
                            </tr>
                        `;
                        detailList.innerHTML += rowHtml;
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    detailList.innerHTML = '<tr><td colspan="4" class="text-center text-danger">載入明細失敗</td></tr>';
                });
        }
    </script>
</body>
</html>
