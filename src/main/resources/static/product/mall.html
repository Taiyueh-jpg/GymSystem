<!DOCTYPE html>
<!-- 🌟 宣告 AngularJS -->
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSystem | 周邊商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 🌟 載入 AngularJS 與 app.js -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="/js/app.js"></script>
    <style>
        [ng\:cloak], [ng-cloak], .ng-cloak { display: none !important; }
        :root {
            --brand:    #e8ff00;
            --dark:     #0d0d0d;
            --surface:  #1a1a1a;
            --card-bg:  #222222;
            --border:   #333333;
            --text:     #f0f0f0;
            --muted:    #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

        /* ── Navbar ── */
        .navbar { background: #0d0d0d; border-bottom: 1px solid var(--border); }
        .navbar-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--brand) !important; }
        .nav-link { color: var(--text) !important; font-size: .9rem; }
        .nav-link:hover { color: var(--brand) !important; }
        .btn-cart { background: var(--brand); color: var(--dark); border: none; font-weight: 700; border-radius: 4px; padding: 6px 18px; position: relative; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ff4444; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: .7rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* ── Hero Banner & Search ── */
        .hero { background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%); border-bottom: 2px solid var(--brand); padding: 60px 0 40px; position: relative; overflow: hidden; }
        .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: var(--brand); line-height: 1; }
        .hero p { color: var(--muted); font-size: .95rem; margin-top: 8px; }
        .search-bar { padding: 24px 0 10px 0; }
        .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px 0 0 4px; padding: 10px 16px; width: 100%; outline: none; }
        .search-input:focus { border-color: var(--brand); }
        .btn-search { background: var(--brand); color: var(--dark); border: none; border-radius: 0 4px 4px 0; padding: 10px 20px; font-weight: 700; cursor: pointer; }
        .category-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-category { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; transition: all 0.2s; cursor: pointer; }
        .btn-category:hover, .btn-category.active { background: var(--brand); color: var(--dark); border-color: var(--brand); font-weight: bold; }

        /* ── 商品卡片 ── */
        .product-count { color: var(--muted); font-size: .85rem; margin-bottom: 20px; }
        .product-count span { color: var(--brand); font-weight: 700; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 100%; display: flex; flex-direction: column; transition: transform .2s; }
        .product-card:hover { transform: translateY(-4px); border-color: var(--brand); }
        .card-img-wrap { width: 100%; aspect-ratio: 1 / 1; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .badge-category { font-size: 0.75rem; background: var(--surface); color: var(--brand); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; border: 1px solid #444;}
        .card-pname { font-size: .95rem; font-weight: 500; margin-bottom: 8px; }
        .card-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--brand); }
        .btn-add-cart { background: transparent; border: 1px solid var(--brand); color: var(--brand); border-radius: 4px; padding: 7px 0; width: 100%; margin-top: 12px; cursor: pointer; font-weight: bold; }
        .btn-add-cart:hover { background: var(--brand); color: var(--dark); }

        /* ── 購物車側欄 ── */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1040; display: none; }
        .cart-overlay.active { display: block; }
        .cart-panel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: var(--surface); z-index: 1050; transition: right .3s ease; display: flex; flex-direction: column; }
        .cart-panel.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .cart-header h5 { color: var(--brand); font-family: 'Bebas Neue'; font-size: 1.4rem; }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--border); }
        .btn-checkout { background: var(--brand); color: var(--dark); width: 100%; padding: 12px; font-weight: bold; border: none; cursor: pointer; display: block; text-align: center; text-decoration: none;}
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
        .toast-msg { background: var(--surface); border: 1px solid var(--brand); padding: 12px 20px; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<!-- 🌟 指定控制器 -->
<body ng-controller="MainCtrl" ng-cloak>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">🏋 GYMSYSTEM</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/pages/course-list.html">課程預約</a></li>
                <li class="nav-item"><a class="nav-link active" href="/product/mall.html">周邊商城</a></li>
            </ul>
            <ul class="navbar-nav align-items-center gap-3">
                <!-- 🔥 新增：我的歷史訂單入口按鈕 -->
                <li class="nav-item">
                    <a href="/history.html" class="btn btn-outline-warning btn-sm fw-bold px-3">
                        📜 我的歷史訂單
                    </a>
                </li>
                
                <li class="nav-item">
                    <!-- 使用 ng-click 綁定開關函數 -->
                    <button class="btn-cart" ng-click="toggleCart()">
                        🛒 購物車 <span class="cart-badge" ng-show="cart.length > 0">{{ cart.length }}</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero">
    <div class="container">
        <h1>周邊商城</h1>
        <p>頂級健身裝備，讓你的訓練更上一層樓</p>
    </div>
</div>

<div class="container">
    <div class="search-bar">
        <div class="d-flex mb-3">
            <input type="text" class="search-input" id="searchInput" placeholder="搜尋商品名稱..." onkeyup="handleSearchKey(event)">
            <button class="btn-search" onclick="searchProducts()">搜尋</button>
        </div>
        
        <div class="category-filters" id="categoryFilters">
            <button class="btn-category active" onclick="filterByCategory('All')">全部商品</button>
            <button class="btn-category" onclick="filterByCategory('高蛋白')">高蛋白乳清</button>
            <button class="btn-category" onclick="filterByCategory('配件')">運動配件</button>
            <button class="btn-category" onclick="filterByCategory('護具')">健身護具</button>
            <button class="btn-category" onclick="filterByCategory('服飾')">運動服飾</button>
        </div>
    </div>

    <p class="product-count">共 <span id="productCount">0</span> 項商品</p>

    <!-- 原生 JS 渲染的商品區塊保留 -->
    <div class="row g-3" id="productGrid"></div>
</div>

<!-- ========================================== -->
<!-- 🛒 AngularJS 購物車側邊欄 -->
<!-- ========================================== -->
<!-- 🔥 使用 ng-class 控制顯示 -->
<div class="cart-overlay" ng-class="{'active': isCartOpen}" ng-click="toggleCart()"></div>
<div class="cart-panel" ng-class="{'active': isCartOpen}">
    <div class="cart-header">
        <h5>購物車</h5>
        <button class="btn btn-sm btn-outline-light" ng-click="toggleCart()">✕</button>
    </div>
    
    <div class="cart-items">
        <div ng-if="cart.length === 0" class="text-center mt-5 text-muted">
            <div class="fs-1 mb-3">🛒</div>
            <p>您的購物車目前是空的</p>
        </div>

        <div ng-repeat="item in cart track by $index" class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-3">
            <div class="text-truncate pe-2" style="max-width: 60%;">
                <h6 class="mb-1 text-white text-truncate" style="font-size: 0.95rem;">{{item.pname}}</h6>
                <small class="text-warning fw-bold">$ {{item.price}}</small>
            </div>
            
            <div class="input-group input-group-sm" style="width: 100px;">
                <button class="btn btn-outline-secondary text-white" type="button" ng-click="updateCartQty($index, -1)">-</button>
                <input type="text" class="form-control text-center text-dark bg-light fw-bold px-1" ng-model="item.quantity" readonly>
                <button class="btn btn-outline-warning" type="button" ng-click="updateCartQty($index, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="cart-footer">
        <div class="d-flex justify-content-between mb-3 text-white">
            <span>總計</span>
            <h4 style="color:var(--brand)">$ {{ getCartTotal() }}</h4>
        </div>
        <a href="/checkout.html" class="btn-checkout">前往結帳</a>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ==========================================
// 🏢 信穎負責的原生 JS 商品區邏輯
// ==========================================
let cart = JSON.parse(sessionStorage.getItem('gymCart')) || []; // 初始化對齊 Session
let allProducts = [];
let currentCategory = 'All';

document.addEventListener('DOMContentLoaded', () => {
    loadProducts();
});

async function loadProducts() {
    try {
        const res = await fetch('/api/products');
        allProducts = await res.json();
        
        allProducts = allProducts.map(p => {
            if(!p.category) {
                if(p.pname.includes('乳清') || p.pname.includes('蛋白')) p.category = '高蛋白';
                else if(p.pname.includes('護腕') || p.pname.includes('腰帶')) p.category = '護具';
                else if(p.pname.includes('毛巾') || p.pname.includes('水壺') || p.pname.includes('瑜珈墊')) p.category = '配件';
                else p.category = '其他';
            }
            return p;
        });
        applyFilters(); 
    } catch (e) {
        showToast('❌ 載入商品失敗，請確認後端伺服器狀態');
    }
}

function filterByCategory(category) {
    currentCategory = category;
    const buttons = document.querySelectorAll('.btn-category');
    buttons.forEach(btn => {
        if(btn.textContent.includes(category) || (category === 'All' && btn.textContent === '全部商品')) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    applyFilters();
}

function applyFilters() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = allProducts;
    if (currentCategory !== 'All') {
        filtered = filtered.filter(p => p.category === currentCategory);
    }
    if (keyword) {
        filtered = filtered.filter(p => p.pname.toLowerCase().includes(keyword));
    }
    renderProducts(filtered);
}

function searchProducts() { applyFilters(); }
function handleSearchKey(e) {
    if (e.key === 'Enter') searchProducts();
    if (document.getElementById('searchInput').value === '') applyFilters();
}

function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    document.getElementById('productCount').textContent = products.length;

    if (products.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><h4>無符合條件之商品</h4></div>';
        return;
    }

    grid.innerHTML = products.map(p => `
        <div class="col-6 col-md-4 col-lg-3">
            <div class="product-card">
                <div class="card-img-wrap">
                    ${p.imageBase64 ? `<img src="${p.imageBase64}" alt="${p.pname}">` : `<div style="font-size:3rem; color:#555;">🏋️</div>`}
                </div>
                <div class="card-body">
                    <div>
                        <span class="badge-category">${p.category || '未分類'}</span>
                        <div class="card-pname">${p.pname}</div>
                        <div class="card-price">$ ${Number(p.price).toLocaleString()} <span style="font-size:12px;color:#888">元</span></div>
                    </div>
                    <!-- 原生 onclick 加入購物車 -->
                    <button class="btn-add-cart" onclick="addToCart(${p.productId})">+ 加入購物車</button>
                </div>
            </div>
        </div>
    `).join('');
}

// 🔥 關鍵修復：整合原生 JS 與 AngularJS
function addToCart(productId) {
    const product = allProducts.find(p => p.productId === productId);
    const existing = cart.find(c => c.productId === productId);
    if (existing) {
        existing.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    
    // 通知 AngularJS 購物車資料已更新！
    if (typeof window.syncCartToAngular === 'function') {
        window.syncCartToAngular(cart);
    }
    
    showToast(`✅ ${product.pname} 已加入`);
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg'; toast.textContent = msg;
    document.getElementById('toastContainer').appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}
</script>
</body>
</html>
