<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSystem | 周邊商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand:    #e8ff00;
            --dark:     #0d0d0d;
            --surface:  #1a1a1a;
            --card-bg:  #222222;
            --border:   #333333;
            --text:     #f0f0f0;
            --muted:    #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar { background: #0d0d0d; border-bottom: 1px solid var(--border); }
        .navbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--brand) !important;
        }
        .nav-link { color: var(--text) !important; font-size: .9rem; }
        .nav-link:hover { color: var(--brand) !important; }
        .btn-cart {
            background: var(--brand);
            color: var(--dark);
            border: none;
            font-weight: 700;
            border-radius: 4px;
            padding: 6px 18px;
            font-size: .85rem;
            letter-spacing: 1px;
            position: relative;
        }
        .btn-cart:hover { background: #d4e800; }
        .cart-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: #ff4444;
            color: #fff;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: .7rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }

        /* ── Hero Banner ── */
        .hero {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
            border-bottom: 2px solid var(--brand);
            padding: 60px 0 40px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: 'SHOP';
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18rem;
            color: rgba(232,255,0,0.03);
            top: -40px; right: -20px;
            line-height: 1;
            pointer-events: none;
        }
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 4px;
            color: var(--brand);
            line-height: 1;
        }
        .hero p { color: var(--muted); font-size: .95rem; margin-top: 8px; }

        /* ── 搜尋列 ── */
        .search-bar { padding: 24px 0; }
        .search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px 0 0 4px;
            padding: 10px 16px;
            font-size: .9rem;
            width: 100%;
            outline: none;
            transition: border-color .2s;
        }
        .search-input:focus { border-color: var(--brand); }
        .search-input::placeholder { color: var(--muted); }
        .btn-search {
            background: var(--brand);
            color: var(--dark);
            border: none;
            border-radius: 0 4px 4px 0;
            padding: 10px 20px;
            font-weight: 700;
            font-size: .85rem;
            letter-spacing: 1px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-search:hover { background: #d4e800; }

        /* ── 商品計數 ── */
        .product-count { color: var(--muted); font-size: .85rem; margin-bottom: 20px; }
        .product-count span { color: var(--brand); font-weight: 700; }

        /* ── 商品卡片 ── */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: transform .2s, border-color .2s, box-shadow .2s;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--brand);
            box-shadow: 0 8px 32px rgba(232,255,0,0.1);
        }
        .card-img-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--surface);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .card-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform .3s;
        }
        .product-card:hover .card-img-wrap img { transform: scale(1.05); }
        .no-image-placeholder {
            color: var(--muted);
            font-size: 3rem;
        }
        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-pname {
            font-size: .95rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: var(--brand);
            letter-spacing: 1px;
        }
        .card-price-unit { font-size: .75rem; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; }
        .btn-add-cart {
            background: transparent;
            border: 1px solid var(--brand);
            color: var(--brand);
            border-radius: 4px;
            padding: 7px 0;
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: background .2s, color .2s;
        }
        .btn-add-cart:hover {
            background: var(--brand);
            color: var(--dark);
        }

        /* ── 空商品提示 ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }
        .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
        .empty-state p { font-size: 1rem; }

        /* ── Toast 通知 ── */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
        .toast-msg {
            background: var(--surface);
            border: 1px solid var(--brand);
            color: var(--text);
            border-radius: 6px;
            padding: 12px 20px;
            font-size: .9rem;
            animation: slideUp .3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .toast-msg .toast-icon { color: var(--brand); font-size: 1.1rem; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 購物車側欄 ── */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1040;
            display: none;
        }
        .cart-overlay.active { display: block; }
        .cart-panel {
            position: fixed; top: 0; right: -420px;
            width: 400px; height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1050;
            transition: right .3s ease;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .cart-panel.active { right: 0; }
        .cart-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .cart-header h5 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--brand);
        }
        .btn-close-cart {
            background: none; border: none;
            color: var(--muted); font-size: 1.4rem;
            cursor: pointer; line-height: 1;
        }
        .btn-close-cart:hover { color: var(--text); }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-img {
            width: 56px; height: 56px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--card-bg);
            flex-shrink: 0;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: .9rem; color: var(--text); }
        .cart-item-price { font-size: .85rem; color: var(--brand); margin-top: 2px; }
        .cart-item-qty {
            display: flex; align-items: center; gap: 8px;
            margin-top: 6px;
        }
        .qty-btn {
            background: var(--border); border: none;
            color: var(--text); width: 24px; height: 24px;
            border-radius: 4px; cursor: pointer; font-size: .9rem;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { background: var(--brand); color: var(--dark); }
        .qty-num { font-size: .9rem; min-width: 20px; text-align: center; }
        .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
        .btn-remove:hover { color: #ff4444; }
        .cart-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }
        .cart-total {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .cart-total-label { color: var(--muted); font-size: .9rem; }
        .cart-total-amount {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--brand);
            letter-spacing: 1px;
        }
        .btn-checkout {
            background: var(--brand);
            color: var(--dark);
            border: none;
            border-radius: 4px;
            padding: 12px 0;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            width: 100%;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-checkout:hover { background: #d4e800; }
        .cart-empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 0;
        }
        .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }

        /* ── 頁尾 ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            color: var(--muted);
            font-size: .8rem;
            margin-top: 60px;
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">🏋 GYMSYSTEM</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/course/list">課程預約</a></li>
                <li class="nav-item"><a class="nav-link active" href="/product/mall">周邊商城</a></li>
            </ul>
            <ul class="navbar-nav align-items-center gap-3">
                <li class="nav-item" th:if="${session.loginMember == null}">
                    <a class="nav-link" href="/member/login">登入 / 註冊</a>
                </li>
                <li class="nav-item dropdown" th:if="${session.loginMember != null}">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <span th:text="${session.loginMember.name} + '，您好'">會員您好</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/member/profile">會員中心</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" onclick="logout()">登出</button></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <button class="btn-cart" onclick="toggleCart()">
                        🛒 購物車
                        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ── Hero ── -->
<div class="hero">
    <div class="container">
        <h1>周邊商城</h1>
        <p>頂級健身裝備，讓你的訓練更上一層樓</p>
    </div>
</div>

<!-- ── 主內容 ── -->
<div class="container">
    <!-- 搜尋列 -->
    <div class="search-bar">
        <div class="d-flex">
            <input type="text" class="search-input" id="searchInput"
                   placeholder="搜尋商品名稱..." onkeyup="handleSearchKey(event)">
            <button class="btn-search" onclick="searchProducts()">搜尋</button>
        </div>
    </div>

    <!-- 商品數量 -->
    <p class="product-count">共 <span id="productCount">0</span> 項商品</p>

    <!-- 商品列表 -->
    <div class="row g-3" id="productGrid">
        <!-- JS 動態渲染 -->
    </div>

    <!-- 空狀態 -->
    <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🏷️</div>
        <p>目前沒有符合的商品</p>
    </div>
</div>

<!-- ── 購物車側欄 ── -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
    <div class="cart-header">
        <h5>購物車</h5>
        <button class="btn-close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span class="cart-total-label">總計</span>
            <span class="cart-total-amount">$ <span id="cartTotal">0</span></span>
        </div>
        <button class="btn-checkout" onclick="goCheckout()">前往結帳</button>
    </div>
</div>

<!-- ── Toast 容器 ── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── 頁尾 ── -->
<footer>
    <div class="container">© 2026 GymSystem. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================================
// 購物車資料（儲存在記憶體，同學 D 結帳時會用到）
// ============================================================
let cart = []; // [{ productId, pname, price, imageBase64, quantity }]
let allProducts = [];

// ── 頁面載入時取得所有商品 ──
document.addEventListener('DOMContentLoaded', () => {
    loadProducts();
});

async function loadProducts() {
    try {
        const res = await fetch('/api/products');
        allProducts = await res.json();
        renderProducts(allProducts);
    } catch (e) {
        showToast('❌ 載入商品失敗，請重新整理');
    }
}

function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('productCount');

    count.textContent = products.length;

    if (products.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    grid.innerHTML = products.map(p => `
        <div class="col-6 col-md-4 col-lg-3">
            <div class="product-card">
                <div class="card-img-wrap">
                    ${p.imageBase64
                        ? `<img src="${p.imageBase64}" alt="${p.pname}">`
                        : `<div class="no-image-placeholder">🏋️</div>`}
                </div>
                <div class="card-body">
                    <div>
                        <div class="card-pname">${p.pname}</div>
                        <div>
                            <span class="card-price">$ ${Number(p.price).toLocaleString()}</span>
                            <span class="card-price-unit"> 元</span>
                        </div>
                    </div>
                    <button class="btn-add-cart" onclick="addToCart(${p.productId})">
                        + 加入購物車
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

// ── 搜尋 ──
async function searchProducts() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) { renderProducts(allProducts); return; }
    try {
        const res = await fetch(`/api/products/search?keyword=${encodeURIComponent(keyword)}`);
        const results = await res.json();
        renderProducts(results);
    } catch (e) {
        showToast('❌ 搜尋失敗');
    }
}

function handleSearchKey(e) {
    if (e.key === 'Enter') searchProducts();
    if (document.getElementById('searchInput').value === '') renderProducts(allProducts);
}

// ── 購物車邏輯 ──
function addToCart(productId) {
    const product = allProducts.find(p => p.productId === productId);
    if (!product) return;

    const existing = cart.find(c => c.productId === productId);
    if (existing) {
        existing.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    updateCartBadge();
    renderCartItems();
    showToast(`✅ 已將「${product.pname}」加入購物車`);
}

function removeFromCart(productId) {
    cart = cart.filter(c => c.productId !== productId);
    updateCartBadge();
    renderCartItems();
}

function changeQty(productId, delta) {
    const item = cart.find(c => c.productId === productId);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) removeFromCart(productId);
    else { updateCartBadge(); renderCartItems(); }
}

function updateCartBadge() {
    const badge = document.getElementById('cartBadge');
    const total = cart.reduce((s, c) => s + c.quantity, 0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
}

function renderCartItems() {
    const list = document.getElementById('cartItemsList');
    const totalEl = document.getElementById('cartTotal');

    if (cart.length === 0) {
        list.innerHTML = `<div class="cart-empty"><div class="empty-icon">🛒</div><p>購物車是空的</p></div>`;
        totalEl.textContent = '0';
        return;
    }

    list.innerHTML = cart.map(item => `
        <div class="cart-item">
            ${item.imageBase64
                ? `<img class="cart-item-img" src="${item.imageBase64}" alt="${item.pname}">`
                : `<div class="cart-item-img d-flex align-items-center justify-content-center" style="font-size:1.5rem">🏋️</div>`}
            <div class="cart-item-info">
                <div class="cart-item-name">${item.pname}</div>
                <div class="cart-item-price">$ ${Number(item.price).toLocaleString()}</div>
                <div class="cart-item-qty">
                    <button class="qty-btn" onclick="changeQty(${item.productId}, -1)">−</button>
                    <span class="qty-num">${item.quantity}</span>
                    <button class="qty-btn" onclick="changeQty(${item.productId}, 1)">＋</button>
                </div>
            </div>
            <button class="btn-remove" onclick="removeFromCart(${item.productId})">🗑</button>
        </div>
    `).join('');

    const total = cart.reduce((s, c) => s + (Number(c.price) * c.quantity), 0);
    totalEl.textContent = total.toLocaleString();
}

function toggleCart() {
    document.getElementById('cartPanel').classList.toggle('active');
    document.getElementById('cartOverlay').classList.toggle('active');
    renderCartItems();
}

// 結帳：將購物車資料傳給同學 D 的結帳頁
function goCheckout() {
    if (cart.length === 0) { showToast('❌ 購物車是空的！'); return; }
    // 將購物車存到 sessionStorage，同學 D 的結帳頁面從這裡讀取
    sessionStorage.setItem('gymCart', JSON.stringify(cart));
    window.location.href = '/order/checkout';
}

// ── Toast 通知 ──
function showToast(msg) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

async function logout() {
    await fetch('/api/members/logout', { method: 'POST' });
    window.location.href = '/';
}
</script>
</body>
</html>
