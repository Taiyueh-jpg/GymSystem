<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>健身房管理系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="./index.html">健身房管理系統</a>
    </div>
</nav>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">健身房管理系統</h1>
        <p class="text-muted">課程 / 教練 / 預約 / 私教方案模組展示首頁</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title">團體課程總覽</h4>
                    <p class="card-text text-muted flex-grow-1">查看公開團體課表，依時間排序，並測試預約 / 取消功能。</p>
                    <a href="./pages/course-list.html" class="btn btn-primary w-100">進入團體課總覽</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title">團體課介紹</h4>
                    <p class="card-text text-muted flex-grow-1">查看每一堂團體課的內容、教練設計理念與適合族群。</p>
                    <a href="./pages/course-intro.html" class="btn btn-primary w-100">進入團體課介紹</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title">教練列表</h4>
                    <p class="card-text text-muted flex-grow-1">查看啟用中的教練，並依教練查看團體課與私人教練可預約時段。</p>
                    <a href="./pages/coach-list.html" class="btn btn-primary w-100">進入教練列表</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title">我的預約</h4>
                    <p class="card-text text-muted flex-grow-1">使用行事曆、時間列表與歷史紀錄查看預約狀態，並可取消或重新預約。</p>
                    <a href="./pages/reservation-list.html" class="btn btn-primary w-100">進入我的預約</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title">購買私教方案</h4>
                    <p class="card-text text-muted flex-grow-1">查看可購買的私教方案，購買後增加會員私教剩餘堂數。</p>
                    <a href="./pages/pt-package.html" class="btn btn-warning w-100">進入購買私教方案</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
