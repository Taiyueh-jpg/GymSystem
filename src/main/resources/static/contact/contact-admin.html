<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言管理 | GymSystem Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a1a;
      --nav:      #2d2d2d;
      --card:     #2a2a2a;
      --card2:    #242424;
      --border:   #3a3a3a;
      --blue:     #2979ff;
      --blue-hov: #5393ff;
      --text:     #e0e0e0;
      --muted:    #888;
      --success:  #4caf50;
      --error:    #f44336;
      --warning:  #ff9800;
      --new-dot:  #f44336;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
    }
    .nav-logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: .88rem;
      color: var(--muted);
    }
    .nav-right span { color: var(--text); }

    /* ── Layout ── */
    .container {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 24px;
      width: 100%;
      flex: 1;
    }

    /* ── Page title ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }
    .unread-badge {
      background: var(--error);
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 10px;
      vertical-align: middle;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 18px;
      font-family: inherit;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #222; }
    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: .82rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
      cursor: pointer;
    }
    tbody tr:hover { background: #2f2f2f; }
    tbody tr.unread { background: rgba(41,121,255,.06); }
    tbody td {
      padding: 14px 16px;
      font-size: .88rem;
      vertical-align: middle;
    }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 500;
    }
    .status-new      { background: rgba(244,67,54,.15);  color: var(--error); }
    .status-replied  { background: rgba(76,175,80,.15);  color: var(--success); }
    .status-closed   { background: rgba(136,136,136,.15); color: var(--muted); }

    .unread-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--new-dot);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .attachment-count {
      font-size: .78rem;
      color: var(--blue);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px 36px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: #fff; }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      padding-right: 24px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      margin-bottom: 20px;
    }
    .info-item label {
      font-size: .75rem;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }
    .info-item span {
      font-size: .9rem;
      color: var(--text);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .section-label {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .content-box {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: .92rem;
      line-height: 1.7;
      white-space: pre-wrap;
      margin-bottom: 16px;
    }

    /* 附件圖片 */
    .attachment-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .attachment-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: opacity .2s;
    }
    .attachment-img:hover { opacity: .8; }

    /* 回覆區 */
    .reply-box {
      background: rgba(76,175,80,.08);
      border: 1px solid rgba(76,175,80,.3);
      border-radius: 8px;
      padding: 14px;
      font-size: .92rem;
      line-height: 1.7;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }
    .reply-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 6px;
    }

    textarea.reply-input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .92rem;
      padding: 12px 14px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color .2s;
    }
    textarea.reply-input:focus { border-color: var(--blue); }

    /* Modal 按鈕列 */
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue   { background: var(--blue);  color: #fff; }
    .btn-blue:hover:not(:disabled)  { background: var(--blue-hov); }
    .btn-red    { background: rgba(244,67,54,.15); color: var(--error); border: 1px solid var(--error); }
    .btn-red:hover:not(:disabled)   { background: rgba(244,67,54,.25); }
    .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text); }

    /* 圖片燈箱 */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    /* ── Alert toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: .9rem;
      z-index: 400;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .toast.show  { display: block; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--error);   color: var(--error); }

    /* ── Footer ── */
    footer {
      background: var(--nav);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 18px;
      font-size: .82rem;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .info-grid { grid-template-columns: 1fr; }
      .modal { padding: 24px 18px; }
      nav { padding: 0 16px; }
      thead th:nth-child(4),
      tbody td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="index.html" class="nav-logo">🏋️ GymSystem <span style="color:var(--muted);font-size:.85rem;font-weight:400;">Admin</span></a>
  <div class="nav-right">
    管理員：<span>Admin</span>
  </div>
</nav>

<!-- Main -->
<div class="container">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <span class="page-title">📬 留言管理</span>
      <span class="unread-badge" id="unreadBadge" style="display:none;">0</span>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterMsgs('all', this)">全部</button>
    <button class="filter-btn" onclick="filterMsgs('new', this)">未回覆</button>
    <button class="filter-btn" onclick="filterMsgs('replied', this)">已回覆</button>
    <button class="filter-btn" onclick="filterMsgs('unread', this)">未讀</button>
    <button class="filter-btn" onclick="filterMsgs('flagged', this)" style="color:var(--warning);border-color:var(--warning);">⚠️ 待審核</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>來源</th>
          <th>類別</th>
          <th>主旨</th>
          <th>狀態</th>
          <th>附件</th>
          <th>時間</th>
        </tr>
      </thead>
      <tbody id="msgTableBody">
        <tr>
          <td colspan="7">
            <div class="empty">
              <div class="empty-icon">⏳</div>
              載入中…
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 留言詳細 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>

    <div class="info-grid" id="modalInfo"></div>
    <hr class="divider" />

    <div class="section-label">留言內容</div>
    <div class="content-box" id="modalContent"></div>

    <!-- 附件 -->
    <div id="attachmentSection" style="display:none;">
      <div class="section-label">附件圖片</div>
      <div class="attachment-grid" id="attachmentGrid"></div>
      <hr class="divider" />
    </div>

    <!-- 已有回覆 -->
    <div id="existingReply" style="display:none;">
      <div class="section-label">回覆內容</div>
      <div class="reply-box" id="replyBox"></div>
      <div class="reply-meta" id="replyMeta"></div>
      <hr class="divider" />
    </div>

    <!-- 回覆輸入 -->
    <div id="replySection">
      <div class="section-label" id="replyLabel">回覆留言</div>
      <textarea class="reply-input" id="replyInput" placeholder="請輸入回覆內容…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-blue"  id="replyBtn"  onclick="submitReply()">送出回覆</button>
      <button class="btn btn-ghost" id="readBtn"   onclick="markRead()">標記已讀</button>
      <button class="btn btn-red"   id="deleteBtn" onclick="deleteMsg()">刪除留言</button>
    </div>
  </div>
</div>

<!-- 圖片燈箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="附件圖片" />
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer>© 2026 GymSystem 健身房管理系統. All Rights Reserved.</footer>

<script>
  const API = 'http://localhost:8080/api/contact/msg';
  // Admin ID（之後配合 admin 登入模組替換）
  const ADMIN_ID = 1;

  let allMsgs   = [];
  let currentMsg = null;
  let currentFilter = 'all';

  // ── 初始化 ──
  window.addEventListener('DOMContentLoaded', loadMsgs);

  async function loadMsgs() {
    try {
      const res = await fetch(API);
      allMsgs = await res.json();
      renderTable(allMsgs);
      updateUnreadBadge();
    } catch (e) {
      showToast('載入失敗，請確認後端服務是否啟動', 'error');
    }
  }

  // ── 渲染表格 ──
  function renderTable(msgs) {
    const tbody = document.getElementById('msgTableBody');

    if (!msgs.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty"><div class="empty-icon">📭</div>目前沒有留言</div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = msgs.map(m => `
      <tr class="${!m.isRead ? 'unread' : ''}" onclick="openModal(${m.msgId})">
        <td>${m.msgId}</td>
        <td>
          ${!m.isRead ? '<span class="unread-dot"></span>' : ''}
          ${m.memberId ? `會員 #${m.memberId}` : (m.guestName || '訪客')}
        </td>
        <td>${m.category}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${m.isFlagged ? '<span style="color:var(--warning);margin-right:4px;" title="包含可疑關鍵字">⚠️</span>' : ''}${m.subject}
        </td>
        <td><span class="status-badge status-${m.msgStatus}">${statusLabel(m.msgStatus)}</span></td>
        <td class="attachment-count">
          ${m.attachments && m.attachments.length ? `🖼️ ${m.attachments.length}` : '—'}
        </td>
        <td style="color:var(--muted);font-size:.82rem;">${formatDate(m.createdAt)}</td>
      </tr>
    `).join('');
  }

  // ── 篩選 ──
  function filterMsgs(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    let filtered;
    if (type === 'all')        filtered = allMsgs;
    else if (type === 'unread')  filtered = allMsgs.filter(m => !m.isRead);
    else if (type === 'flagged') filtered = allMsgs.filter(m => m.isFlagged);
    else filtered = allMsgs.filter(m => m.msgStatus === type);
    renderTable(filtered);
  }

  // ── 未讀徽章 ──
  function updateUnreadBadge() {
    const count = allMsgs.filter(m => !m.isRead).length;
    const badge = document.getElementById('unreadBadge');
    if (count > 0) {
      badge.textContent = count;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }

  // ── 開啟 Modal ──
  function openModal(msgId) {
    currentMsg = allMsgs.find(m => m.msgId === msgId);
    if (!currentMsg) return;

    // 標題
    document.getElementById('modalTitle').textContent = `【${currentMsg.category}】${currentMsg.subject}`;

    // 基本資訊
    const sender = currentMsg.memberId
      ? `會員 #${currentMsg.memberId}`
      : `${currentMsg.guestName}（訪客）`;
    const email = currentMsg.memberId ? '（會員帳號）' : currentMsg.guestEmail;

    document.getElementById('modalInfo').innerHTML = `
      <div class="info-item"><label>留言編號</label><span>#${currentMsg.msgId}</span></div>
      <div class="info-item"><label>狀態</label><span class="status-badge status-${currentMsg.msgStatus}">${statusLabel(currentMsg.msgStatus)}</span></div>
      <div class="info-item"><label>寄件人</label><span>${sender}</span></div>
      <div class="info-item"><label>Email</label><span>${email}</span></div>
      <div class="info-item"><label>已讀</label><span>${currentMsg.isRead ? '✅ 已讀' : '❌ 未讀'}</span></div>
      <div class="info-item"><label>時間</label><span>${formatDate(currentMsg.createdAt)}</span></div>
      ${currentMsg.isFlagged ? `<div class="info-item"><label>關鍵字審核</label><span style="color:var(--warning);">⚠️ 含可疑關鍵字：${currentMsg.flaggedKeywords || ''}</span></div>` : ''}
      ${currentMsg.orderId  ? `<div class="info-item"><label>關聯訂單</label><span>#${currentMsg.orderId}</span></div>` : ''}
      ${currentMsg.courseId ? `<div class="info-item"><label>關聯課程</label><span>#${currentMsg.courseId}</span></div>` : ''}
    `;

    // 留言內容
    document.getElementById('modalContent').textContent = currentMsg.content;

    // 附件
    const attSection = document.getElementById('attachmentSection');
    const attGrid    = document.getElementById('attachmentGrid');
    if (currentMsg.attachments && currentMsg.attachments.length) {
      attGrid.innerHTML = currentMsg.attachments.map(a =>
        `<img class="attachment-img" src="${a.filePath}" alt="${a.fileName}"
              onclick="openLightbox('${a.filePath}')" />`
      ).join('');
      attSection.style.display = 'block';
    } else {
      attSection.style.display = 'none';
    }

    // 已有回覆
    const existingReply = document.getElementById('existingReply');
    if (currentMsg.replyContent) {
      document.getElementById('replyBox').textContent  = currentMsg.replyContent;
      document.getElementById('replyMeta').textContent =
        `回覆時間：${formatDate(currentMsg.repliedAt)}　Admin #${currentMsg.adminId}`;
      existingReply.style.display = 'block';
      document.getElementById('replyLabel').textContent = '修改回覆';
      document.getElementById('replyInput').value = currentMsg.replyContent;
    } else {
      existingReply.style.display = 'none';
      document.getElementById('replyLabel').textContent = '回覆留言';
      document.getElementById('replyInput').value = '';
    }

    // 已讀按鈕
    document.getElementById('readBtn').style.display =
      currentMsg.isRead ? 'none' : 'inline-block';

    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    currentMsg = null;
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── 送出回覆 ──
  async function submitReply() {
    if (!currentMsg) return;
    const content = document.getElementById('replyInput').value.trim();
    if (!content) { showToast('請輸入回覆內容', 'error'); return; }

    const btn = document.getElementById('replyBtn');
    btn.disabled = true;
    btn.textContent = '送出中…';

    try {
      const res = await fetch(`${API}/${currentMsg.msgId}/reply`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ replyContent: content, adminId: ADMIN_ID })
      });

      if (res.ok) {
        showToast('回覆成功！', 'success');
        closeModal();
        await loadMsgs();
      } else {
        showToast('回覆失敗', 'error');
      }
    } catch (e) {
      showToast('網路錯誤', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '送出回覆';
    }
  }

  // ── 標記已讀 ──
  async function markRead() {
    if (!currentMsg) return;
    try {
      const res = await fetch(`${API}/${currentMsg.msgId}/read`, { method: 'PUT' });
      if (res.ok) {
        showToast('已標記為已讀', 'success');
        closeModal();
        await loadMsgs();
      }
    } catch (e) {
      showToast('操作失敗', 'error');
    }
  }

  // ── 刪除留言 ──
  async function deleteMsg() {
    if (!currentMsg) return;
    if (!confirm(`確定要刪除留言 #${currentMsg.msgId}？此操作無法復原。`)) return;

    const btn = document.getElementById('deleteBtn');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/${currentMsg.msgId}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('留言已刪除', 'success');
        closeModal();
        await loadMsgs();
      }
    } catch (e) {
      showToast('刪除失敗', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  // ── 圖片燈箱 ──
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }

  // ── Toast ──
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── 工具 ──
  function statusLabel(s) {
    return { new: '未回覆', replied: '已回覆', closed: '已關閉' }[s] || s;
  }

  function formatDate(str) {
    if (!str) return '—';
    return str.replace('T', ' ').substring(0, 16);
  }
</script>
</body>
</html>
