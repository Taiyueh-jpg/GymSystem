<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聯絡我們 | GymSystem</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --nav:       #2d2d2d;
      --card:      #2a2a2a;
      --border:    #3a3a3a;
      --blue:      #2979ff;
      --blue-hov:  #5393ff;
      --text:      #e0e0e0;
      --muted:     #888;
      --success:   #4caf50;
      --error:     #f44336;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
    }
    .nav-logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.92rem;
      transition: color .2s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: #fff; font-weight: 500; }
    .nav-links .btn-outline {
      border: 1px solid var(--border);
      color: var(--text);
    }
    .nav-links .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 320px;
      background: url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=1400&q=80')
                  center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.58);
    }
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .hero-content h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }
    .hero-content p {
      margin-top: 10px;
      color: rgba(255,255,255,.75);
      font-size: 1rem;
    }

    /* ── Main layout ── */
    main { flex: 1; max-width: 780px; margin: 56px auto; padding: 0 20px; width: 100%; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 44px;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 28px;
      color: #fff;
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: .85rem; color: var(--muted); }
    .form-group label span.req { color: var(--blue); margin-left: 2px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      padding: 10px 14px;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--blue); }
    .form-group input.err,
    .form-group select.err,
    .form-group textarea.err { border-color: var(--error); }
    .form-group textarea { resize: vertical; min-height: 130px; }
    .form-group select option { background: var(--card); }
    .err-msg { font-size: .78rem; color: var(--error); min-height: 16px; }

    /* Guest fields (hidden when member) */
    .guest-section { display: contents; }

    /* ── 附件區（僅會員） ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      position: relative;
    }
    .upload-area:hover { border-color: var(--blue); }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-area .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-area p { color: var(--muted); font-size: .88rem; }
    .upload-area p strong { color: var(--text); }
    .preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .preview-item {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-item .remove-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,.65);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: .75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .upload-hint { font-size: .78rem; color: var(--muted); margin-top: 8px; }

    /* ── Submit ── */
    .form-actions { display: flex; justify-content: flex-end; margin-top: 28px; }
    .btn-submit {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 36px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn-submit:hover { background: var(--blue-hov); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Alert ── */
    .alert {
      display: none;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: .95rem;
      margin-bottom: 24px;
    }
    .alert.success { background: rgba(76,175,80,.15); border: 1px solid var(--success); color: var(--success); }
    .alert.error   { background: rgba(244,67,54,.12);  border: 1px solid var(--error);   color: var(--error); }
    .alert.show    { display: block; }

    /* ── Footer ── */
    footer {
      background: var(--nav);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 20px;
      font-size: .82rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 28px 20px; }
      nav { padding: 0 16px; }
      .nav-links a { padding: 5px 8px; font-size: .82rem; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="index.html" class="nav-logo">🏋️ GymSystem</a>
  <div class="nav-links">
    <a href="index.html">首頁</a>
    <a href="article.html">文章</a>
    <a href="faq.html">常見問題</a>
    <a href="contact.html" class="active">聯絡我們</a>
    <a href="login.html" class="btn-outline">登入 / 註冊</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1>聯絡我們</h1>
    <p>有任何問題？我們很樂意為您解答</p>
  </div>
</section>

<!-- Main -->
<main>
  <div class="card">
    <div class="card-title">✉️ 留言表單</div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <form id="contactForm" novalidate>

      <!-- 訪客欄位（登入後自動隱藏） -->
      <div class="form-grid" id="guestFields">
        <div class="form-group">
          <label>姓名 <span class="req">*</span></label>
          <input type="text" id="guestName" placeholder="請輸入您的姓名" maxlength="50" />
          <span class="err-msg" id="guestNameErr"></span>
        </div>
        <div class="form-group">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="guestEmail" placeholder="example@email.com" maxlength="100" />
          <span class="err-msg" id="guestEmailErr"></span>
        </div>
      </div>

      <div class="form-grid" style="margin-top:20px;">
        <!-- 類別 -->
        <div class="form-group">
          <label>類別 <span class="req">*</span></label>
          <select id="category">
            <option value="">— 請選擇 —</option>
            <option value="課程諮詢">課程諮詢</option>
            <option value="帳號問題">帳號問題</option>
            <option value="設備問題">設備問題</option>
            <option value="訂單問題">訂單問題</option>
            <option value="投訴建議">投訴建議</option>
            <option value="其他">其他</option>
          </select>
          <span class="err-msg" id="categoryErr"></span>
        </div>

        <!-- 主旨 -->
        <div class="form-group">
          <label>主旨 <span class="req">*</span></label>
          <input type="text" id="subject" placeholder="請簡述問題主旨" maxlength="100" />
          <span class="err-msg" id="subjectErr"></span>
        </div>

        <!-- 留言內容 -->
        <div class="form-group full">
          <label>留言內容 <span class="req">*</span></label>
          <textarea id="content" placeholder="請詳細描述您的問題或建議…" maxlength="3000"></textarea>
          <span class="err-msg" id="contentErr"></span>
        </div>

        <!-- 圖片上傳（僅會員，預設隱藏） -->
        <div class="form-group full" id="uploadSection" style="display:none;">
          <label>附圖（選填，最多 3 張，每張不超過 5MB）</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp"
                   multiple />
            <div class="upload-icon">🖼️</div>
            <p><strong>點擊或拖曳</strong>上傳圖片</p>
            <p>支援 JPG、PNG、GIF、WEBP</p>
          </div>
          <div class="preview-list" id="previewList"></div>
          <div class="upload-hint" id="uploadHint">已選 0 / 3 張</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" id="submitBtn">送出留言</button>
      </div>
    </form>
  </div>
</main>

<!-- Footer -->
<footer>
  © 2026 GymSystem 健身房管理系統. All Rights Reserved.
</footer>

<script>
  const API = 'http://localhost:8080/api/contact/msg';

  // ── 模擬登入狀態（之後換成真實 session/token）──
  // null = 訪客；有值 = 會員 memberId
  const MEMBER_ID = null; // 例如改成 42 測試會員上傳功能

  const isMember = MEMBER_ID !== null;

  // 若已登入，隱藏訪客欄位、顯示上傳區
  if (isMember) {
    document.getElementById('guestFields').style.display = 'none';
    document.getElementById('uploadSection').style.display = 'block';
  }

  // ── 圖片上傳邏輯 ──
  let selectedFiles = [];

  document.getElementById('fileInput').addEventListener('change', function () {
    const newFiles = Array.from(this.files);
    const combined = [...selectedFiles, ...newFiles];

    if (combined.length > 3) {
      showAlert('最多只能上傳 3 張圖片', 'error');
      this.value = '';
      return;
    }

    for (const f of newFiles) {
      if (f.size > 5 * 1024 * 1024) {
        showAlert(`「${f.name}」超過 5MB，請重新選擇`, 'error');
        this.value = '';
        return;
      }
    }

    selectedFiles = combined;
    renderPreviews();
    this.value = '';
  });

  function renderPreviews() {
    const list = document.getElementById('previewList');
    list.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = e => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.innerHTML = `
          <img src="${e.target.result}" alt="preview" />
          <button class="remove-btn" onclick="removeFile(${idx})">✕</button>`;
        list.appendChild(item);
      };
      reader.readAsDataURL(file);
    });
    document.getElementById('uploadHint').textContent =
      `已選 ${selectedFiles.length} / 3 張`;
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderPreviews();
  }

  // ── 表單送出 ──
  document.getElementById('contactForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!validate()) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送出中…';

    try {
      const msgObj = buildMsgObj();
      const formData = new FormData();
      formData.append('msg', new Blob([JSON.stringify(msgObj)], { type: 'application/json' }));
      if (isMember) {
        selectedFiles.forEach(f => formData.append('files', f));
      }

      const res = await fetch(API, { method: 'POST', body: formData });

      if (res.ok) {
        showAlert('✅ 留言已送出！我們將盡快回覆您。', 'success');
        resetForm();
      } else {
        const msg = await res.text();
        showAlert('送出失敗：' + msg, 'error');
      }
    } catch (err) {
      showAlert('網路錯誤，請稍後再試', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '送出留言';
    }
  });

  function buildMsgObj() {
    const obj = {
      subject:  document.getElementById('subject').value.trim(),
      category: document.getElementById('category').value,
      content:  document.getElementById('content').value.trim(),
    };
    if (isMember) {
      obj.memberId = MEMBER_ID;
    } else {
      obj.guestName  = document.getElementById('guestName').value.trim();
      obj.guestEmail = document.getElementById('guestEmail').value.trim();
    }
    return obj;
  }

  // ── 表單驗證 ──
  function validate() {
    let ok = true;

    if (!isMember) {
      ok = checkField('guestName',  'guestNameErr',  '請輸入姓名') && ok;
      ok = checkEmail('guestEmail', 'guestEmailErr') && ok;
    }
    ok = checkSelect('category', 'categoryErr', '請選擇類別') && ok;
    ok = checkField('subject',   'subjectErr',   '請輸入主旨') && ok;
    ok = checkField('content',   'contentErr',   '請輸入留言內容') && ok;

    return ok;
  }

  function checkField(id, errId, msg) {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      setErr(el, errId, msg); return false;
    }
    clearErr(el, errId); return true;
  }

  function checkSelect(id, errId, msg) {
    const el = document.getElementById(id);
    if (!el.value) { setErr(el, errId, msg); return false; }
    clearErr(el, errId); return true;
  }

  function checkEmail(id, errId) {
    const el = document.getElementById(id);
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!el.value.trim()) { setErr(el, errId, '請輸入 Email'); return false; }
    if (!re.test(el.value.trim())) { setErr(el, errId, 'Email 格式不正確'); return false; }
    clearErr(el, errId); return true;
  }

  function setErr(el, errId, msg) {
    el.classList.add('err');
    document.getElementById(errId).textContent = msg;
  }
  function clearErr(el, errId) {
    el.classList.remove('err');
    document.getElementById(errId).textContent = '';
  }

  // ── Alert ──
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (type === 'success') setTimeout(() => el.classList.remove('show'), 6000);
  }

  function resetForm() {
    document.getElementById('contactForm').reset();
    selectedFiles = [];
    renderPreviews();
    ['guestName','guestEmail','category','subject','content'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('err');
    });
    ['guestNameErr','guestEmailErr','categoryErr','subjectErr','contentErr'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
  }
</script>
</body>
</html>
