<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查詢留言紀錄 | GymSystem</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1a1a;
      --nav:     #2d2d2d;
      --card:    #2a2a2a;
      --border:  #3a3a3a;
      --blue:    #2979ff;
      --blue-hov:#5393ff;
      --text:    #e0e0e0;
      --muted:   #888;
      --success: #4caf50;
      --warning: #ff9800;
      --error:   #f44336;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: var(--nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 1.2rem; font-weight: 700; color: #fff; text-decoration: none; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      padding: 6px 14px; border-radius: 6px; font-size: .9rem; transition: all .2s;
    }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.outline {
      border: 1px solid var(--blue); color: var(--blue);
    }
    .nav-links a.outline:hover { background: var(--blue); color: #fff; }

    /* ── Main ── */
    .container { max-width: 760px; margin: 60px auto; padding: 0 24px; flex: 1; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 36px; line-height: 1.6; }

    /* ── Search Card ── */
    .search-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      margin-bottom: 36px;
    }
    .search-card label {
      display: block; font-size: .9rem; color: var(--muted); margin-bottom: 8px;
    }
    .search-row { display: flex; gap: 12px; }
    .search-row input {
      flex: 1;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: 8px;
      font-size: .95rem; font-family: inherit; transition: border-color .2s;
    }
    .search-row input:focus { outline: none; border-color: var(--blue); }
    .btn {
      padding: 12px 24px; border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue-hov); }
    .btn-blue:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Results ── */
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .result-header h2 { font-size: 1rem; font-weight: 600; }
    .result-count { color: var(--muted); font-size: .85rem; }

    /* ── Message Card ── */
    .msg-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .msg-card:hover { border-color: var(--blue); background: #2f2f2f; }
    .msg-card.has-reply { border-left: 4px solid var(--success); }
    .msg-card.flagged   { border-left: 4px solid var(--warning); }

    .msg-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 12px; flex-wrap: wrap;
    }
    .msg-subject {
      font-size: 1rem; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .msg-badges { display: flex; gap: 6px; align-items: center; }
    .badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-new      { background: rgba(244,67,54,.15); color: var(--error); }
    .badge-replied  { background: rgba(76,175,80,.15);  color: var(--success); }
    .badge-category { background: rgba(41,121,255,.12); color: var(--blue); }
    .badge-unread-reply { background: rgba(255,152,0,.15); color: var(--warning); }

    .msg-meta {
      color: var(--muted); font-size: .82rem;
      display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .msg-content-preview {
      color: #bbb; font-size: .88rem; line-height: 1.6;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── Reply Preview ── */
    .reply-preview {
      margin-top: 14px;
      background: #1f2a1f;
      border-left: 3px solid var(--success);
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
    }
    .reply-preview-label {
      font-size: .75rem; color: var(--success); margin-bottom: 6px; font-weight: 600;
    }
    .reply-preview-text {
      font-size: .88rem; color: #ccc; line-height: 1.6;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .reply-preview-time { font-size: .75rem; color: var(--muted); margin-top: 6px; }

    /* ── Empty / Loading ── */
    .state-box {
      text-align: center; padding: 60px 0; color: var(--muted);
    }
    .state-icon { font-size: 3rem; margin-bottom: 16px; }
    .state-text { font-size: .95rem; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
      padding: 20px;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 600px;
      max-height: 85vh; overflow-y: auto;
      transform: translateY(16px); transition: transform .2s;
      position: relative;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; padding-right: 24px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .section-label {
      font-size: .75rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 10px;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px;
    }
    .info-item label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 3px; }
    .info-item span  { font-size: .9rem; }
    .content-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; font-size: .9rem;
      line-height: 1.7; white-space: pre-wrap; color: #ccc;
    }
    .reply-box {
      background: #1f2a1f; border-left: 3px solid var(--success);
      border-radius: 0 8px 8px 0; padding: 16px;
      font-size: .9rem; line-height: 1.7; white-space: pre-wrap; color: #ccc;
    }
    .reply-meta { font-size: .8rem; color: var(--muted); margin-top: 8px; }

    /* ── Attachments ── */
    .attachment-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .attachment-img {
      width: 90px; height: 90px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--border);
      cursor: pointer; transition: opacity .2s;
    }
    .attachment-img:hover { opacity: .8; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .lightbox.show { opacity: 1; pointer-events: auto; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      background: none; border: none; color: #fff;
      font-size: 1.5rem; cursor: pointer;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 14px 22px; border-radius: 10px;
      font-size: .9rem; box-shadow: 0 4px 20px rgba(0,0,0,.4);
      opacity: 0; transform: translateY(12px);
      transition: all .3s; pointer-events: none; z-index: 999;
    }
    .toast.show   { opacity: 1; transform: translateY(0); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error   { border-left: 4px solid var(--error); }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 24px;
      color: var(--muted); font-size: .82rem;
      border-top: 1px solid var(--border); margin-top: auto;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="../index.html" class="nav-logo">🏋️ GymSystem</a>
  <div class="nav-links">
    <a href="../index.html">首頁</a>
    <a href="contact.html">聯絡我們</a>
    <a href="guest-inquiry.html">查詢留言</a>
    <a href="../login.html" class="outline">登入 / 註冊</a>
  </div>
</nav>

<!-- Main -->
<div class="container">

  <h1>📬 查詢留言紀錄</h1>
  <p class="subtitle">
    輸入您留言時填寫的 Email，即可查看所有留言紀錄及客服回覆。<br>
    若您是會員，請登入後在個人頁面查看留言。
  </p>

  <!-- Search -->
  <div class="search-card">
    <label for="emailInput">訪客 Email</label>
    <div class="search-row">
      <input type="email" id="emailInput"
             placeholder="請輸入留言時使用的 Email..."
             onkeydown="if(event.key==='Enter') searchMsgs()" />
      <button class="btn btn-blue" id="searchBtn" onclick="searchMsgs()">查詢</button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsSection" style="display:none;">
    <div class="result-header">
      <h2>查詢結果</h2>
      <span class="result-count" id="resultCount"></span>
    </div>
    <div id="msgList"></div>
  </div>

  <!-- Initial state -->
  <div id="initialState" class="state-box">
    <div class="state-icon">✉️</div>
    <div class="state-text">輸入 Email 查詢您的留言紀錄</div>
  </div>

</div>

<!-- 留言詳細 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>

    <div class="info-grid" id="modalInfo"></div>
    <hr class="divider" />

    <div class="section-label">留言內容</div>
    <div class="content-box" id="modalContent"></div>

    <!-- 附件 -->
    <div id="attachmentSection" style="display:none;">
      <hr class="divider" />
      <div class="section-label">附件圖片</div>
      <div class="attachment-grid" id="attachmentGrid"></div>
    </div>

    <!-- 回覆 -->
    <div id="replySection" style="display:none;">
      <hr class="divider" />
      <div class="section-label">客服回覆</div>
      <div class="reply-box" id="replyBox"></div>
      <div class="reply-meta" id="replyMeta"></div>
    </div>
  </div>
</div>

<!-- 圖片燈箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="附件圖片" />
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer>© 2026 GymSystem 健身房管理系統. All Rights Reserved.</footer>

<script>
  const API = 'http://localhost:8080/api/contact/msg/guest';
  let currentMsg = null;

  // ── 查詢 ──
  async function searchMsgs() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showToast('請輸入 Email', 'error'); return; }
    if (!isValidEmail(email)) { showToast('請輸入正確的 Email 格式', 'error'); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '查詢中…';

    try {
      const res = await fetch(`${API}?email=${encodeURIComponent(email)}`);
      if (!res.ok) {
        showToast('查詢失敗，請稍後再試', 'error');
        return;
      }
      const msgs = await res.json();
      renderResults(msgs, email);
    } catch (e) {
      showToast('網路錯誤，請確認後端服務是否啟動', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '查詢';
    }
  }

  // ── 渲染結果 ──
  function renderResults(msgs, email) {
    document.getElementById('initialState').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('resultCount').textContent =
      `共找到 ${msgs.length} 筆留言（${email}）`;

    const list = document.getElementById('msgList');

    if (!msgs.length) {
      list.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📭</div>
          <div class="state-text">此 Email 尚無留言紀錄</div>
        </div>`;
      return;
    }

    list.innerHTML = msgs.map(m => {
      const hasReply   = !!m.replyContent;
      const unreadReply = hasReply && !m.isReplyRead;
      let cardClass = 'msg-card';
      if (hasReply)    cardClass += ' has-reply';

      return `
        <div class="${cardClass}" onclick="openModal(${m.msgId}, ${JSON.stringify(msgs).replace(/"/g, '&quot;')})">
          <div class="msg-card-header">
            <div class="msg-subject">${escHtml(m.subject)}</div>
            <div class="msg-badges">
              <span class="badge badge-category">${escHtml(m.category)}</span>
              <span class="badge ${hasReply ? 'badge-replied' : 'badge-new'}">
                ${hasReply ? '✅ 已回覆' : '⏳ 待回覆'}
              </span>
              ${unreadReply ? '<span class="badge badge-unread-reply">🔔 新回覆</span>' : ''}
            </div>
          </div>
          <div class="msg-meta">
            <span>留言編號 #${m.msgId}</span>
            <span>類別：${escHtml(m.category)}</span>
            <span>時間：${formatDate(m.createdAt)}</span>
            ${m.attachments && m.attachments.length
              ? `<span>🖼️ 附件 ${m.attachments.length} 張</span>` : ''}
          </div>
          <div class="msg-content-preview">${escHtml(m.content)}</div>
          ${hasReply ? `
            <div class="reply-preview">
              <div class="reply-preview-label">客服回覆</div>
              <div class="reply-preview-text">${escHtml(m.replyContent)}</div>
              <div class="reply-preview-time">回覆時間：${formatDate(m.repliedAt)}</div>
            </div>` : ''}
        </div>`;
    }).join('');
  }

  // ── 開啟 Modal ──
  function openModal(msgId, msgsJson) {
    // msgsJson 從 onclick 傳入會是 HTML decoded string，直接重新 fetch 比較穩
    const email = document.getElementById('emailInput').value.trim();
    fetch(`${API}?email=${encodeURIComponent(email)}`)
      .then(r => r.json())
      .then(msgs => {
        currentMsg = msgs.find(m => m.msgId === msgId);
        if (!currentMsg) return;
        renderModal(currentMsg);
        document.getElementById('modalOverlay').classList.add('show');
      });
  }

  function renderModal(msg) {
    document.getElementById('modalTitle').textContent =
      `【${msg.category}】${msg.subject}`;

    document.getElementById('modalInfo').innerHTML = `
      <div class="info-item"><label>留言編號</label><span>#${msg.msgId}</span></div>
      <div class="info-item"><label>狀態</label>
        <span>${msg.replyContent
          ? '<span style="color:var(--success);">✅ 已回覆</span>'
          : '<span style="color:var(--muted);">⏳ 待回覆</span>'}</span>
      </div>
      <div class="info-item"><label>姓名</label><span>${escHtml(msg.guestName)}</span></div>
      <div class="info-item"><label>Email</label><span>${escHtml(msg.guestEmail)}</span></div>
      <div class="info-item"><label>類別</label><span>${escHtml(msg.category)}</span></div>
      <div class="info-item"><label>留言時間</label><span>${formatDate(msg.createdAt)}</span></div>
    `;

    document.getElementById('modalContent').textContent = msg.content;

    // 附件
    const attSection = document.getElementById('attachmentSection');
    const attGrid    = document.getElementById('attachmentGrid');
    if (msg.attachments && msg.attachments.length) {
      attGrid.innerHTML = msg.attachments.map(a =>
        `<img class="attachment-img" src="${a.filePath}" alt="${escHtml(a.fileName)}"
              onclick="event.stopPropagation();openLightbox('${a.filePath}')" />`
      ).join('');
      attSection.style.display = 'block';
    } else {
      attSection.style.display = 'none';
    }

    // 回覆
    const replySection = document.getElementById('replySection');
    if (msg.replyContent) {
      document.getElementById('replyBox').textContent  = msg.replyContent;
      document.getElementById('replyMeta').textContent =
        `回覆時間：${formatDate(msg.repliedAt)}`;
      replySection.style.display = 'block';
    } else {
      replySection.style.display = 'none';
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    currentMsg = null;
  }
  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── Lightbox ──
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }

  // ── Toast ──
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Utils ──
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }
  function formatDate(str) {
    if (!str) return '—';
    return str.replace('T', ' ').substring(0, 16);
  }
  function escHtml(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
