<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <title>會員中心 - GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>
<body style="background-color: #121212; color: #ffffff;">
    <div class="container mt-5" ng-controller="ProfileCtrl" ng-cloak>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card bg-dark text-light border-secondary">
                    <div class="card-header bg-secondary fw-bold">
                        📊 會員資料管理
                        <a href="index.html" class="btn btn-sm btn-outline-light float-end">回首頁</a>
                    </div>
                    <div class="card-body">
                        <!-- 白話文：呼叫 updateProfile() 把修改後的資料送給後端 -->
                        <form ng-submit="updateProfile()">
                            <div class="mb-3">
                                <label class="form-label">信箱 (帳號無法修改)</label>
                                <!-- 白話文：信箱設為 readonly，保護資料庫的唯一性 -->
                                <input type="email" class="form-control text-muted" ng-model="profileData.email" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">姓名</label>
                                <input type="text" class="form-control" ng-model="profileData.name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">電話</label>
                                <input type="text" class="form-control" ng-model="profileData.mobile">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">聯絡地址</label>
                                <input type="text" class="form-control" ng-model="profileData.address">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">儲存修改</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
