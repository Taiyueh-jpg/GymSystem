<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確認結帳 | GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
    <style>
        [ng\:cloak], [ng-cloak], .ng-cloak { display: none !important; }
        :root {
            --brand:    #e8ff00;
            --dark:     #0d0d0d;
            --surface:  #1a1a1a;
            --card-bg:  #222222;
            --border:   #333333;
            --text:     #f0f0f0;
            --muted:    #aaaaaa;
        }
        
        body { background-color: var(--dark); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
        
        /* ── Navbar ── */
        .navbar { background: #0d0d0d; border-bottom: 1px solid var(--border); }
        .navbar-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--brand) !important; }
        
        /* ── 結帳容器與卡片 ── */
        .checkout-container { max-width: 1200px; margin: 50px auto; padding-bottom: 80px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); padding: 2rem !important; }
        .card-title { color: var(--brand); font-family: 'Bebas Neue', 'Noto Sans TC', sans-serif; font-size: 2rem; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 30px; }
        
        /* ── 表單元件 ── */
        .form-label { color: var(--text); font-weight: 500; font-size: 1.1rem; }
        .form-control::placeholder { color: #666666; font-size: 0.95rem; }
        .form-select, .form-control { background-color: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px; font-size: 1.05rem; transition: 0.3s; }
        .form-select:focus, .form-control:focus { background-color: var(--surface); color: var(--text); border-color: var(--brand); box-shadow: 0 0 0 0.25rem rgba(232, 255, 0, 0.25); }
        select option { background-color: var(--surface); color: var(--text); }
        
        /* ── 購物車明細與按鈕 ── */
        .summary-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px dashed var(--border); }
        .product-img-mini { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; margin-right: 20px; background: var(--surface); border: 1px solid var(--border); }
        .item-title { font-size: 1.15rem; font-weight: 500; margin-bottom: 6px; color: var(--text); }
        .item-price { font-size: 1rem; color: var(--muted); }
        
        .text-brand { color: var(--brand) !important; }
        .btn-brand { background-color: var(--brand); color: var(--dark); border: none; font-weight: bold; font-size: 1.2rem !important; transition: all 0.2s; }
        .btn-brand:hover { background-color: #d4e600; color: var(--dark); transform: translateY(-2px); }
        .qty-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; }
        .qty-btn:hover { background: var(--border); color: var(--text); }
        .qty-input { background: var(--dark) !important; border: 1px solid var(--border) !important; color: var(--text) !important; font-size: 1.1rem; }
        .alert-info-dark { background-color: rgba(232, 255, 0, 0.1); border: 1px solid rgba(232, 255, 0, 0.2); color: var(--text); font-size: 1.05rem; }

        /* 🔥 虛擬信用卡視覺效果 🔥 */
        .credit-card-box {
            background: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%);
            border: 1px solid #444;
            border-radius: 16px;
            padding: 25px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            height: 220px;
            transition: all 0.4s ease;
        }
        .credit-card-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg); pointer-events: none;
        }
        .cc-logo { font-size: 1.8rem; font-style: italic; font-weight: bold; color: var(--brand); text-align: right; margin-bottom: 15px; font-family: 'Bebas Neue', sans-serif;}
        .cc-chip { width: 45px; height: 35px; background: linear-gradient(135deg, #d4af37 0%, #aa7700 100%); border-radius: 6px; margin-bottom: 15px; position: relative; }
        .cc-chip::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(0,0,0,0.3); }
        .cc-number-display { font-family: 'Courier New', Courier, monospace; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 25px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .cc-bottom { display: flex; justify-content: space-between; text-transform: uppercase; font-size: 0.8rem; color: var(--muted); }
        .cc-value { color: #fff; font-size: 1.2rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    </style>
</head>
<body ng-controller="MainCtrl" ng-cloak>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <span class="navbar-brand mb-0">🏋️ GYMSYSTEM 結帳中心</span>
            <div class="d-flex align-items-center">
                <a href="product/mall.html" class="btn btn-outline-light btn-sm me-3 fs-6">返回商城</a>
                <span class="text-brand me-3 fw-bold fs-5" ng-if="currentUser">Hi, {{ currentUser.name }}</span>
            </div>
        </div>
    </nav>

    <div class="container checkout-container">
        <div class="row g-5">
            <div class="col-lg-6">
                <div class="card h-100">
                    <h4 class="card-title">🚚 收件與支付資訊</h4>
                    <form id="checkoutForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold">配送方式</label>
                            <select class="form-select" id="deliveryMethod" required>
                                <option value="" disabled selected>請選擇您的收件方式</option>
                                <option value="宅配到府">宅配到府</option>
                                <option value="超商取貨">超商取貨 (7-11 / 全家)</option>
                                <option value="健身房自取">健身房自取 (免運費)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">付款方式</label>
                            <select class="form-select" id="paymentType" onchange="toggleCreditCard()" required>
                                <option value="" disabled selected>請選擇您的付款方式</option>
                                <option value="線上刷卡">💳 信用卡 / 金融卡 (線上刷卡)</option>
                                <option value="LINE Pay">🟢 LINE Pay</option>
                                <option value="貨到付款">📦 貨到付款</option>
                            </select>
                        </div>
                        
                        <div id="creditCardSection" style="display: none;" class="mt-4 border-top border-secondary pt-4">
                            
                            <div class="credit-card-box">
                                <div class="cc-logo">VISA</div>
                                <div class="cc-chip"></div>
                                <div class="cc-number-display" id="card-display-number">#### #### #### ####</div>
                                <div class="cc-bottom">
                                    <div>
                                        <div>Card Holder</div>
                                        <div class="cc-value" id="card-display-name">YOUR NAME</div>
                                    </div>
                                    <div>
                                        <div>Expires</div>
                                        <div class="cc-value" id="card-display-date">MM/YY</div>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mt-1">
                                <div class="col-12">
                                    <label class="form-label text-light fs-6 fw-bold">持卡人英文姓名</label>
                                    <input type="text" class="form-control" id="cc-name" placeholder="請輸入信用卡正面姓名 (例如：WANG DA MING)" oninput="updateCardName(this)">
                                    <div class="form-text text-secondary mt-1" style="font-size: 0.85rem;">※ 請務必與實體卡片正面印製的英文姓名一致。</div>
                                </div>
                                <div class="col-12 mt-4">
                                    <label class="form-label text-light fs-6 fw-bold">16 碼信用卡號</label>
                                    <input type="text" class="form-control" id="cc-number" placeholder="請輸入 16 位數字 (例如：4000 1234 5678 9010)" maxlength="19" oninput="formatCardNumber(this)">
                                    <div class="form-text text-secondary mt-1" style="font-size: 0.85rem;">※ 支援 Visa, MasterCard, JCB 卡片正面數字。</div>
                                </div>
                                <div class="col-6 mt-4">
                                    <label class="form-label text-light fs-6 fw-bold">有效期限 (月/年)</label>
                                    <input type="text" class="form-control" id="cc-date" placeholder="格式：MM/YY (例如：12/28)" maxlength="5" oninput="formatCardDate(this)">
                                    <div class="form-text text-secondary mt-1" style="font-size: 0.85rem;">※ 參考卡片正面下方日期。</div>
                                </div>
                                <div class="col-6 mt-4">
                                    <label class="form-label text-light fs-6 fw-bold">背面安全碼 (CVV)</label>
                                    <input type="password" class="form-control" id="cc-cvv" placeholder="背面的 3 位數字" maxlength="3" oninput="this.value=this.value.replace(/\D/g,'')">
                                    <div class="form-text text-secondary mt-1" style="font-size: 0.85rem;">※ 卡片背面簽名欄旁的最後 3 碼。</div>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-info-dark rounded-3 p-3 mt-5" id="security-alert">
                            <span class="fs-5">🔒</span> 點擊「確認下單」後，系統將透過 SSL 加密安全處理您的訂單。
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card h-100">
                    <h4 class="card-title">🛒 訂單摘要</h4>
                    <div id="cart-items-list" class="mb-4 flex-grow-1 overflow-auto" style="max-height: 450px; padding-right: 10px;">
                        </div>
                    
                    <div class="d-flex justify-content-between align-items-center mt-4 pt-4 border-top border-secondary">
                        <span class="fs-4 fw-bold text-muted">總計金額</span>
                        <span id="display-total" class="fs-1 fw-bold text-brand" style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;">NT$ 0</span>
                    </div>

                    <button class="btn btn-brand w-100 py-3 mt-4 shadow" onclick="submitOrder()">
                        確認下單 🚀
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCart = [];
        let totalAmount = 0;

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('gymUser'));
            if (!user || !user.memberId) {
                alert("結帳前請先登入會員！");
                window.location.href = "login.html";
                return;
            }

            let cartData = JSON.parse(sessionStorage.getItem('gymCart'));
            if (!cartData || cartData.length === 0) {
                cartData = [
                    { productId: 1, pname: "頂級乳清蛋白粉 (雙倍巧克力)", price: 1200, quantity: 1, imageBase64: "" },
                    { productId: 2, pname: "GymSystem 吸汗運動毛巾 (黑)", price: 350, quantity: 2, imageBase64: "" }
                ];
                sessionStorage.setItem('gymCart', JSON.stringify(cartData));
            }
            
            currentCart = cartData;
            renderCartSummary();
        };

        function renderCartSummary() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = '';
            totalAmount = 0;

            currentCart.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                totalAmount += subtotal;
                
                const imgSrc = item.imageBase64 ? `<img src="${item.imageBase64}" class="product-img-mini">` : `<div class="product-img-mini d-flex align-items-center justify-content-center fs-2">📦</div>`;

                list.innerHTML += `
                    <div class="summary-item">
                        <div class="d-flex align-items-center" style="width: 60%;">
                            ${imgSrc}
                            <div class="pe-3">
                                <div class="item-title">${item.pname}</div>
                                <div class="item-price">單價 NT$ ${item.price.toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="d-flex flex-column align-items-end">
                            <div class="fs-5 fw-bold mb-3 text-white">NT$ ${subtotal.toLocaleString()}</div>
                            <div class="input-group input-group-md" style="width: 120px;">
                                <button class="btn qty-btn fw-bold" type="button" onclick="updateQty(${index}, -1)">-</button>
                                <input type="text" class="form-control text-center px-1 qty-input fw-bold" value="${item.quantity}" readonly>
                                <button class="btn qty-btn fw-bold" type="button" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('display-total').innerText = 'NT$ ' + totalAmount.toLocaleString();
        }

        function updateQty(index, change) {
            let item = currentCart[index];
            item.quantity += change;

            if (item.quantity < 1) {
                if(confirm('確定要將此商品移出購物車嗎？')) {
                    currentCart.splice(index, 1);
                } else {
                    item.quantity = 1; 
                }
            }
            sessionStorage.setItem('gymCart', JSON.stringify(currentCart));
            renderCartSummary();
        }

        function toggleCreditCard() {
            const val = document.getElementById('paymentType').value;
            const ccSection = document.getElementById('creditCardSection');
            if (val === '線上刷卡') {
                ccSection.style.display = 'block';
            } else {
                ccSection.style.display = 'none';
            }
        }

        function updateCardName(input) {
            input.value = input.value.toUpperCase(); 
            document.getElementById('card-display-name').innerText = input.value || 'YOUR NAME';
        }

        function formatCardNumber(input) {
            let val = input.value.replace(/\D/g, ''); 
            val = val.replace(/(.{4})/g, '$1 ').trim(); 
            input.value = val;
            document.getElementById('card-display-number').innerText = val || '#### #### #### ####';
        }

        function formatCardDate(input) {
            let val = input.value.replace(/\D/g, '');
            if (val.length >= 3) {
                val = val.substring(0, 2) + '/' + val.substring(2, 4);
            }
            input.value = val;
            document.getElementById('card-display-date').innerText = val || 'MM/YY';
        }

        function submitOrder() {
            const delivery = document.getElementById('deliveryMethod').value;
            const payment = document.getElementById('paymentType').value;

            if (!delivery || !payment) {
                alert("請完整選擇配送與付款方式！");
                return;
            }

            if (payment === '線上刷卡') {
                const ccName = document.getElementById('cc-name').value;
                const ccNum = document.getElementById('cc-number').value;
                const ccDate = document.getElementById('cc-date').value;
                const ccCvv = document.getElementById('cc-cvv').value;

                if (!ccName || ccNum.length < 19 || ccDate.length < 5 || ccCvv.length < 3) {
                    alert("請確實填寫信用卡上的所有資訊！");
                    return;
                }
            }

            const user = JSON.parse(localStorage.getItem('gymUser'));
            
            if (!user || !user.memberId) {
                alert("找不到會員資料，請重新登入！");
                window.location.href = "login.html";
                return;
            }

            const payload = {
                porder: {
                    memberId: user.memberId, 
                    deliveryMethod: delivery,
                    paymentType: payment, 
                    totalAmount: totalAmount,
                    status: (payment === '線上刷卡' || payment === 'LINE Pay') ? "paid" : "processing" 
                },
                details: currentCart.map(item => ({
                    productId: item.productId,
                    quantity: item.quantity,
                    unitPrice: item.price
                }))
            };

            fetch('/api/orders/checkout', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': user.memberId.toString(),
                    'ngrok-skip-browser-warning': 'true' 
                },
                body: JSON.stringify(payload)
            })
            .then(async res => {
                const text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    alert("❌ 系統發生異常，請按 F12 查看 Console！");
                    return;
                }

                if (res.ok) {
                    if (data.status === 'ECPAY') {
                        // 保留以防重啟
                    } 
                    else if (data.status === 'SUCCESS') {
                        if(payment === '線上刷卡') {
                            alert("💳 信用卡授權成功！\n🎉 " + data.message);
                        } else {
                            alert("🎉 " + data.message);
                        }
                        sessionStorage.removeItem('gymCart'); 
                        window.location.href = "history.html"; 
                    }
                } else {
                    alert("❌ 結帳失敗：" + (data.error || data.message || "未知錯誤"));
                }
            })
            .catch(err => {
                console.error(err);
                alert("⚠️ 連線後端失敗，請確認 Server 是否啟動且網路正常！");
            });
        }
    </script>
</body>
</html>
