<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <title>登入 - GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="bg-gym-image d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="container" ng-controller="AuthCtrl" ng-cloak>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card service-card p-4 shadow-lg rounded-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">GymSystem</h2>
                        <p class="text-light">突破極限，成就更好的自己</p>
                    </div>
                    <ul class="nav nav-pills nav-justified mb-4">
                        <li class="nav-item">
                            <a class="nav-link" ng-class="{'active': loginType === 'member'}" ng-click="setLoginType('member')" href="#">學員登入</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn-outline-secondary text-white" ng-class="{'active bg-secondary': loginType === 'admin'}" ng-click="setLoginType('admin')" href="#">教練/員工登入</a>
                        </li>
                    </ul>
                    <form ng-submit="doLogin()">
                        <div class="mb-3">
                            <label class="form-label text-light">電子信箱</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" ng-model="loginData.email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-light">密碼</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" ng-model="loginData.password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            {{ loginType === 'member' ? '登入會員' : '進入後台' }}
                        </button>
                    </form>
                    <div class="text-center mt-3" ng-if="loginType === 'member'">
                        <span class="text-light">還沒有帳號嗎？</span>
                        <a href="register.html" class="text-primary text-decoration-none fw-bold">立即註冊</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
