<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <title>登入 - GymSystem</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>

    <style>
        [ng\:cloak],
        [ng-cloak],
        .ng-cloak {
            display: none !important;
        }

        .login-page {
            min-height: 100vh;
            position: relative;
        }

        .top-actions {
            position: fixed;
            top: 22px;
            right: 28px;
            z-index: 20;
        }

        .home-btn {
            border: 1px solid rgba(255,255,255,.65);
            color: #fff;
            background: rgba(0,0,0,.28);
            backdrop-filter: blur(8px);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 14px;
            text-decoration: none;
            transition: all .2s ease;
        }

        .home-btn:hover {
            color: #fff;
            background: rgba(255,255,255,.14);
            border-color: #fff;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .form-control {
            padding-right: 72px;
        }

        .toggle-password-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #0d6efd;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 6px;
            line-height: 1;
        }

        .toggle-password-btn:hover {
            color: #66a3ff;
        }

        .login-helper-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 576px) {
            .top-actions {
                top: 14px;
                right: 14px;
            }

            .home-btn {
                padding: 7px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body class="bg-gym-image login-page d-flex align-items-center justify-content-center">

    <div class="top-actions">
        <a href="index.html" class="home-btn">回首頁</a>
    </div>

    <div class="container" ng-controller="AuthCtrl" ng-cloak>
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card service-card p-4 shadow-lg rounded-4">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">GymSystem</h2>
                        <p class="text-light mb-0">突破極限，成就更好的自己</p>
                    </div>

                    <ul class="nav nav-pills nav-justified mb-4">
                        <li class="nav-item">
                            <a class="nav-link"
                               ng-class="{'active': loginType === 'member'}"
                               ng-click="setLoginType('member')"
                               href="#">
                                學員登入
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link btn-outline-secondary text-white"
                               ng-class="{'active bg-secondary': loginType === 'admin'}"
                               ng-click="setLoginType('admin')"
                               href="#">
                                教練/員工登入
                            </a>
                        </li>
                    </ul>

                    <form ng-submit="doLogin()">

                        <div class="mb-3">
                            <label class="form-label text-light">電子信箱</label>
                            <input type="email"
                                   class="form-control bg-dark text-white border-secondary"
                                   ng-model="loginData.email"
                                   autocomplete="email"
                                   required>
                        </div>

                        <div class="mb-4">
                            <div class="login-helper-row mb-1">
                                <label class="form-label text-light mb-0">密碼</label>
                            </div>

                            <div class="password-wrap">
                                <input id="loginPassword"
                                       type="password"
                                       class="form-control bg-dark text-white border-secondary"
                                       ng-model="loginData.password"
                                       autocomplete="current-password"
                                       required>

                                <button type="button"
                                        class="toggle-password-btn"
                                        onclick="togglePasswordVisibility()"
                                        id="togglePasswordBtn">
                                    顯示
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            {{ loginType === 'member' ? '登入會員' : '進入後台' }}
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-light">還沒有帳號嗎？</span>
                        <a href="register.html" class="text-primary text-decoration-none fw-bold">立即註冊</a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('loginPassword');
            const toggleBtn = document.getElementById('togglePasswordBtn');

            if (!passwordInput || !toggleBtn) return;

            const isPassword = passwordInput.type === 'password';

            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? '隱藏' : '顯示';
        }
    </script>
</body>
</html>
