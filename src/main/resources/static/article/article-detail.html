<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文章內容 — GymSystem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a; color: #ffffff;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ─────────────────────────────────────────── */
    .navbar {
      background: #2d2d2d;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #fff;
      font-size: 18px; font-weight: 700;
    }
    .navbar-right { display: flex; align-items: center; gap: 16px; }
    .nav-link {
      color: #ccc; text-decoration: none; font-size: 14px;
      transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .btn-login {
      background: transparent; border: 1px solid #fff;
      color: #fff; padding: 6px 18px; border-radius: 4px;
      font-size: 14px; text-decoration: none;
      transition: background 0.2s;
    }
    .btn-login:hover { background: rgba(255,255,255,0.1); }

    /* ── Breadcrumb ─────────────────────────────────────── */
    .breadcrumb {
      background: #222; padding: 12px 32px;
      font-size: 13px; color: #777;
      border-bottom: 1px solid #2a2a2a;
    }
    .breadcrumb a { color: #aaa; text-decoration: none; }
    .breadcrumb a:hover { color: #fff; }
    .breadcrumb span { margin: 0 8px; }

    /* ── Article Wrap ────────────────────────────────────── */
    .article-wrap {
      max-width: 800px; margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* Loading / Error */
    .state-box {
      text-align: center; padding: 80px 20px; color: #666;
    }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid #333; border-top-color: #2979ff;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Article Header */
    .article-category {
      font-size: 12px; color: #aaa; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .article-title {
      font-size: clamp(22px, 4vw, 36px); font-weight: 700;
      line-height: 1.3; margin-bottom: 20px;
    }
    .article-meta {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      padding: 14px 0; border-top: 1px solid #333; border-bottom: 1px solid #333;
      margin-bottom: 32px; font-size: 13px; color: #777;
    }
    .pinned-badge {
      background: #2979ff; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 10px; border-radius: 3px; letter-spacing: 1px;
    }

    /* Cover Image */
    .article-cover {
      width: 100%; max-height: 360px; object-fit: cover;
      border-radius: 8px; margin-bottom: 32px;
      border: 1px solid #333;
    }

    /* Content */
    .article-content {
      font-size: 15px; line-height: 1.9; color: #ccc;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Back Button */
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 48px; padding: 10px 24px;
      background: transparent; border: 1px solid #444;
      border-radius: 4px; color: #aaa; text-decoration: none;
      font-size: 14px; transition: all 0.2s;
    }
    .btn-back:hover { border-color: #fff; color: #fff; }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      text-align: center; padding: 24px;
      color: #555; font-size: 12px;
      border-top: 1px solid #2a2a2a;
    }

    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .article-wrap { padding: 24px 16px 60px; }
      .breadcrumb { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="../index.html" class="navbar-brand">🏋️ GymSystem</a>
  <div class="navbar-right">
    <a href="../index.html" class="nav-link">首頁</a>
    <a href="article-list.html" class="nav-link active">最新消息</a>
    <a href="../faq/faq.html" class="nav-link">常見問答</a>
    <a href="../contact/contact.html" class="nav-link">聯絡我們</a>
    <a href="../member/login.html" class="btn-login">登入 / 註冊</a>
  </div>
</nav>

<!-- ── Breadcrumb ─────────────────────────────────────────── -->
<div class="breadcrumb">
  <a href="../index.html">首頁</a>
  <span>›</span>
  <a href="article-list.html">最新消息</a>
  <span>›</span>
  <span id="bc-title">文章內容</span>
</div>

<!-- ── Article Content ───────────────────────────────────── -->
<div class="article-wrap" id="article-wrap">
  <div class="state-box">
    <div class="spinner"></div>
    <p>載入中...</p>
  </div>
</div>

<footer>
  © 2026 GymSystem 健身房系統 All Rights Reserved
</footer>

<script>
  const API_BASE = 'http://localhost:8080';

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function getArticleId() {
    return new URLSearchParams(window.location.search).get('id');
  }

  async function loadArticle() {
    const id = getArticleId();
    const wrap = document.getElementById('article-wrap');

    if (!id) {
      wrap.innerHTML = `<div class="state-box"><p>⚠️ 缺少文章 ID</p><br><a href="article-list.html" class="btn-back">← 返回列表</a></div>`;
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/api/articles/list`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const articles = await res.json();
      const article = articles.find(a => String(a.articleId) === String(id));

      if (!article) {
        wrap.innerHTML = `<div class="state-box"><p>找不到該文章</p><br><a href="article-list.html" class="btn-back">← 返回列表</a></div>`;
        return;
      }

      // 更新頁面標題和麵包屑
      document.title = `${article.title} — GymSystem`;
      document.getElementById('bc-title').textContent = article.title;

      // Cloudinary 網址直接用，舊本機路徑才補 API_BASE
      const imgSrc = article.imageUrl
        ? (article.imageUrl.startsWith('http') ? article.imageUrl : `${API_BASE}/${article.imageUrl}`)
        : null;
      const coverHtml = imgSrc
        ? `<img class="article-cover" src="${imgSrc}" alt="${article.title}" onerror="this.style.display='none'">`
        : '';

      const pinnedBadge = article.isPinned
        ? `<span class="pinned-badge">📌 置頂</span>` : '';

      wrap.innerHTML = `
        <div class="article-category">${article.category || '公告'}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">
          ${pinnedBadge}
          <span>📅 ${formatDate(article.publishedAt)}</span>
          <span>✍️ ${article.admin?.name || 'GymSystem'}</span>
        </div>
        ${coverHtml}
        <div class="article-content">${article.content}</div>
        <a href="article-list.html" class="btn-back">← 返回最新消息</a>
      `;
    } catch (err) {
      wrap.innerHTML = `<div class="state-box"><p>⚠️ 載入失敗<br><small style="color:#555">${err.message}</small></p><br><a href="article-list.html" class="btn-back">← 返回列表</a></div>`;
    }
  }

  loadArticle();
</script>
</body>
</html>
