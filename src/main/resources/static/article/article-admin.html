<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章管理 | GymSystem Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a1a;
      --nav:      #2d2d2d;
      --card:     #2a2a2a;
      --card2:    #242424;
      --border:   #3a3a3a;
      --blue:     #2979ff;
      --blue-hov: #5393ff;
      --text:     #e0e0e0;
      --muted:    #888;
      --success:  #4caf50;
      --error:    #f44336;
      --warning:  #ff9800;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 700; color: #fff; text-decoration: none; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; padding: 6px 14px;
      border-radius: 6px; font-size: 14px; transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--border); color: var(--text); }
    .nav-right {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: .88rem;
    }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 5px 14px; border-radius: 6px;
      font-size: .82rem; cursor: pointer; font-family: inherit;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 36px auto; padding: 0 24px; flex: 1; }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 24px;
    }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #fff; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); border-radius: 20px; padding: 6px 18px;
      font-family: inherit; font-size: .85rem; cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 18px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .btn-blue  { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue-hov); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-red   { background: transparent; color: var(--error); border: 1px solid var(--error); }
    .btn-red:hover { background: var(--error); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Table ── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #222; }
    thead th {
      padding: 13px 16px; text-align: left; font-size: .8rem;
      color: var(--muted); font-weight: 500; white-space: nowrap;
      text-transform: uppercase; letter-spacing: .5px;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 13px 16px; font-size: .88rem; vertical-align: middle; }
    .col-title { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 999px; font-size: .75rem; font-weight: 500;
    }
    .badge-published { background: rgba(76,175,80,.15);   color: var(--success); }
    .badge-draft     { background: rgba(136,136,136,.15); color: var(--muted); }
    .badge-archived  { background: rgba(255,152,0,.15);   color: var(--warning); }
    .badge-pinned    { background: rgba(41,121,255,.15);  color: var(--blue); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 660px;
      padding: 32px 36px; position: relative; margin: auto;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: #fff; }
    .modal-title {
      font-size: 1.1rem; font-weight: 700; color: #fff;
      margin-bottom: 24px; padding-right: 28px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 8px;
      font-size: .9rem; font-family: inherit; transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--blue); }
    .form-group textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-check { display: flex; align-items: center; gap: 10px; font-size: .9rem; cursor: pointer; }
    .form-check input { width: auto; accent-color: var(--blue); }

    /* ── 圖片上傳區 ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: border-color .2s; position: relative;
    }
    .upload-zone:hover { border-color: var(--blue); }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-zone-text { font-size: .85rem; color: var(--muted); }
    .upload-zone-text span { color: var(--blue); }

    /* 預覽圖 */
    .img-preview-wrap {
      margin-top: 12px; display: none;
      position: relative; display: none;
    }
    .img-preview-wrap.show { display: block; }
    .img-preview {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--border);
      display: block;
    }
    .img-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.7); border: none; color: #fff;
      border-radius: 50%; width: 28px; height: 28px;
      cursor: pointer; font-size: 14px; line-height: 28px;
      text-align: center;
    }
    .img-remove:hover { background: var(--error); }

    /* 上傳進度 */
    .upload-progress {
      display: none; margin-top: 8px;
      font-size: .8rem; color: var(--blue);
    }
    .upload-progress.show { display: block; }

    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 14px 22px; border-radius: 10px;
      font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.4);
      opacity: 0; transform: translateY(12px);
      transition: all .3s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-left: 4px solid var(--success); }
    #toast.error   { border-left: 4px solid var(--error); }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 24px; color: var(--muted);
      font-size: .8rem; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🏋️ GymSystem Admin</a>
  <div class="nav-links">
    <a href="contact-admin.html">客服留言</a>
    <a href="keyword-filter-admin.html">關鍵字過濾</a>
    <a href="article-admin.html" class="active">文章管理</a>
  </div>
  <!--
    ✅ [修改] 移除寫死的 "Admin #1"，改為：
       - 顯示從 /api/admin/me 取得的管理員姓名與 ID
       - 加入登出按鈕，點擊後呼叫 /api/admin/logout 並跳轉登入頁
  -->
  <div class="nav-right">
    <span id="adminDisplay">載入中...</span>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-title">📰 文章管理</div>
    <button class="btn btn-blue" onclick="openCreateModal()">＋ 新增文章</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterStatus(this,'all')">全部</button>
    <button class="filter-btn" onclick="filterStatus(this,'published')">✅ 已發布</button>
    <button class="filter-btn" onclick="filterStatus(this,'draft')">📝 草稿</button>
    <button class="filter-btn" onclick="filterStatus(this,'archived')">📦 已下架</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:50px">ID</th>
          <th>封面</th>
          <th>標題</th>
          <th>分類</th>
          <th>狀態</th>
          <th>置頂</th>
          <th>發布時間</th>
          <th style="width:220px">操作</th>
        </tr>
      </thead>
      <tbody id="articleTbody">
        <tr><td colspan="8">
          <div class="empty"><div class="empty-icon">⏳</div>載入中...</div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>© 2026 GymSystem 健身房管理系統. All Rights Reserved.</footer>

<!-- ── 新增 / 編輯 Modal ── -->
<div class="modal-overlay" id="formModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeFormModal()">✕</button>
    <div class="modal-title" id="formModalTitle">新增文章</div>

    <input type="hidden" id="editId" />

    <div class="form-group">
      <label>標題 *</label>
      <input type="text" id="fTitle" placeholder="請輸入文章標題" maxlength="150" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>分類</label>
        <select id="fCategory">
          <option value="">— 選擇分類 —</option>
          <option value="優惠資訊">優惠資訊</option>
          <option value="課程公告">課程公告</option>
          <option value="系統公告">系統公告</option>
        </select>
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="fStatus">
          <option value="draft">草稿</option>
          <option value="published">立即發布</option>
          <option value="archived">下架</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>內容 *</label>
      <textarea id="fContent" placeholder="請輸入文章內容"></textarea>
    </div>

    <!-- ── 封面圖上傳區 ── -->
    <div class="form-group">
      <label>封面圖片（選填，最大 5MB）</label>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fImageFile" accept="image/*" onchange="handleFileSelect(event)" />
        <div class="upload-zone-text">
          📷 點擊或拖曳圖片至此<br>
          <span>選擇圖片</span>（jpg / png / webp，最大 5MB）
        </div>
      </div>

      <div class="upload-progress" id="uploadProgress">⏳ 上傳至 Cloudinary 中...</div>

      <div class="img-preview-wrap" id="imgPreviewWrap">
        <img class="img-preview" id="imgPreview" src="" alt="封面預覽" />
        <button class="img-remove" onclick="removeImage()" title="移除圖片">✕</button>
      </div>

      <input type="hidden" id="fImageUrl" />
    </div>

    <div class="form-group">
      <label class="form-check">
        <input type="checkbox" id="fIsPinned" />
        置頂此文章
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeFormModal()">取消</button>
      <button class="btn btn-blue" id="submitBtn" onclick="submitForm()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/articles';

  /**
   * ✅ [修改] ADMIN_ID 不再寫死。
   * 改為在頁面載入時，透過 checkLoginAndInit() 呼叫 GET /api/admin/me，
   * 從後端 Session 取得目前登入者的 adminId，再存到這個變數中。
   * 若未登入，checkLoginAndInit() 會直接跳轉到登入頁，不會執行後續流程。
   */
  let ADMIN_ID = null;

  let allArticles   = [];
  let currentFilter = 'all';
  let isEditMode    = false;

  // ── 頁面入口：先驗證登入，再載入資料 ──────────────────────
  window.addEventListener('DOMContentLoaded', checkLoginAndInit);

  /**
   * ✅ [新增] 登入驗證 + 初始化
   *
   * 1. 呼叫 GET /api/admin/me（需登入才能存取，WebConfig 已加入攔截名單）
   * 2. 若後端回傳 401 → 表示 Session 中沒有登入資訊 → 跳轉登入頁
   * 3. 若成功取得 Admin 物件 → 記錄 ADMIN_ID，更新 Navbar 顯示，再載入文章
   *
   * 對應後端：AdminController.getMe()
   */
  async function checkLoginAndInit() {
    try {
      const res = await fetch('http://localhost:8080/api/admin/me', { credentials: 'include' });

      if (res.status === 401) {
        // ❌ 未登入：跳轉到登入頁
        // 💡 請將下方路徑改成你的實際登入頁路徑
        window.location.href = '../login.html';
        return;
      }

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      // ✅ 已登入：取得 Admin 物件
      const admin = await res.json();

      // 將 adminId 存入模組層級變數，後續新增/編輯文章時使用
      ADMIN_ID = admin.adminId;

      // 更新 Navbar 右上角顯示（姓名 + ID）
      document.getElementById('adminDisplay').textContent =
        `${admin.name}（${admin.role === 'admin' ? '管理者' : '教練'}）`;

      // 登入驗證通過，載入文章列表
      await loadArticles();

    } catch (e) {
      showToast('驗證登入狀態失敗，請重新整理', 'error');
    }
  }

  /**
   * ✅ [新增] 登出功能
   *
   * 呼叫 POST /api/admin/logout 銷毀後端 Session，
   * 完成後跳轉到登入頁，確保前後端狀態同步清除。
   */
  async function logout() {
    try {
      await fetch('http://localhost:8080/api/admin/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {
      // 即使請求失敗，仍強制跳轉登入頁（例如後端已重啟導致 Session 消失）
    } finally {
      window.location.href = '../login.html';
    }
  }

  // ── 載入文章列表 ────────────────────────────────────────
  async function loadArticles() {
    try {
      const res = await fetch(`${API}/admin/list`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allArticles = await res.json();
      renderTable(filterArticles(currentFilter));
    } catch (e) {
      showToast('載入失敗，請確認後端服務是否啟動', 'error');
    }
  }

  function filterArticles(status) {
    return status === 'all' ? allArticles : allArticles.filter(a => a.status === status);
  }

  function filterStatus(btn, status) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(filterArticles(status));
  }

  // ── 渲染表格 ────────────────────────────────────────────
  function renderTable(list) {
    const tbody = document.getElementById('articleTbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty"><div class="empty-icon">📭</div>目前沒有文章</div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(a => `
      <tr>
        <td style="color:var(--muted)">${a.articleId}</td>
        <td>
          ${a.imageUrl
            ? `<img src="${a.imageUrl}" style="width:52px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--border)">`
            : `<span style="color:var(--muted);font-size:1.2rem">—</span>`}
        </td>
        <td class="col-title" title="${escHtml(a.title)}">${escHtml(a.title)}</td>
        <td style="color:var(--muted)">${a.category || '—'}</td>
        <td><span class="badge badge-${a.status}">${statusLabel(a.status)}</span></td>
        <td>${a.isPinned
          ? '<span class="badge badge-pinned">📌 置頂</span>'
          : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="color:var(--muted);font-size:.82rem">${formatDate(a.publishedAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal(${a.articleId})">編輯</button>
            ${a.status === 'draft'
              ? `<button class="btn btn-blue btn-sm" onclick="publishArticle(${a.articleId})">發布</button>`
              : ''}
            ${a.isPinned
              ? `<button class="btn btn-ghost btn-sm" onclick="togglePin(${a.articleId},false)">取消置頂</button>`
              : `<button class="btn btn-ghost btn-sm" onclick="togglePin(${a.articleId},true)">置頂</button>`}
            <button class="btn btn-red btn-sm" onclick="deleteArticle(${a.articleId})">刪除</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── 圖片上傳 ────────────────────────────────────────────
  async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 3 * 1024 * 1024) {
      showToast('圖片不可超過 3MB', 'error');
      event.target.value = '';
      return;
    }

    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('uploadProgress').classList.add('show');

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API}/upload-image`, {
        method: 'POST',
        credentials: 'include',
        body: formData
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || '上傳失敗');
      }

      const data = await res.json();
      const imageUrl = data.imageUrl;

      document.getElementById('fImageUrl').value = imageUrl;
      document.getElementById('imgPreview').src = imageUrl;
      document.getElementById('imgPreviewWrap').classList.add('show');
      showToast('✅ 圖片上傳成功', 'success');

    } catch (e) {
      showToast('圖片上傳失敗：' + e.message, 'error');
      document.getElementById('uploadZone').style.display = 'block';
    } finally {
      document.getElementById('uploadProgress').classList.remove('show');
      event.target.value = '';
    }
  }

  function removeImage() {
    document.getElementById('fImageUrl').value = '';
    document.getElementById('imgPreview').src = '';
    document.getElementById('imgPreviewWrap').classList.remove('show');
    document.getElementById('uploadZone').style.display = 'block';
  }

  // ── 開啟新增 Modal ───────────────────────────────────────
  function openCreateModal() {
    isEditMode = false;
    document.getElementById('formModalTitle').textContent = '新增文章';
    document.getElementById('submitBtn').textContent = '新增';
    document.getElementById('editId').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('fCategory').value = '';
    document.getElementById('fStatus').value = 'draft';
    document.getElementById('fIsPinned').checked = false;
    removeImage();
    document.getElementById('formModal').classList.add('show');
  }

  // ── 開啟編輯 Modal ───────────────────────────────────────
  function openEditModal(id) {
    const a = allArticles.find(x => x.articleId === id);
    if (!a) return;
    isEditMode = true;
    document.getElementById('formModalTitle').textContent = '編輯文章';
    document.getElementById('submitBtn').textContent = '儲存修改';
    document.getElementById('editId').value = a.articleId;
    document.getElementById('fTitle').value = a.title;
    document.getElementById('fContent').value = a.content;
    document.getElementById('fCategory').value = a.category || '';
    document.getElementById('fStatus').value = a.status;
    document.getElementById('fIsPinned').checked = !!a.isPinned;

    if (a.imageUrl) {
      document.getElementById('fImageUrl').value = a.imageUrl;
      document.getElementById('imgPreview').src = a.imageUrl;
      document.getElementById('imgPreviewWrap').classList.add('show');
      document.getElementById('uploadZone').style.display = 'none';
    } else {
      removeImage();
    }

    document.getElementById('formModal').classList.add('show');
  }

  function closeFormModal() {
    document.getElementById('formModal').classList.remove('show');
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('formModal')) closeFormModal();
  }

  // ── 送出新增 / 編輯 ─────────────────────────────────────
  async function submitForm() {
    const title   = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('fContent').value.trim();
    if (!title)   { showToast('請輸入標題', 'error'); return; }
    if (!content) { showToast('請輸入內容', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '處理中…';

    /**
     * ✅ [修改] admin.adminId 不再寫死為 1，
     * 改用 checkLoginAndInit() 從後端取得並存入的 ADMIN_ID 變數。
     */
    const payload = {
      title,
      content,
      category: document.getElementById('fCategory').value,
      status:   document.getElementById('fStatus').value,
      imageUrl: document.getElementById('fImageUrl').value || null,
      isPinned: document.getElementById('fIsPinned').checked,
      admin: { adminId: ADMIN_ID } // ✅ 動態取得，不再寫死
    };

    try {
      let res;
      if (isEditMode) {
        const id = document.getElementById('editId').value;
        res = await fetch(`${API}/update/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch(`${API}/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
      }

      if (res.ok) {
        showToast(isEditMode ? '✅ 更新成功' : '✅ 新增成功', 'success');
        closeFormModal();
        await loadArticles();
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.message || '操作失敗', 'error');
      }
    } catch (e) {
      showToast('網路錯誤', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = isEditMode ? '儲存修改' : '新增';
    }
  }

  // ── 快速發布 ─────────────────────────────────────────────
  async function publishArticle(id) {
    if (!confirm('確定要發布此文章？發布後將自動寄信通知所有有效會員。')) return;
    try {
      const res = await fetch(`${API}/publish/${id}`, { method: 'PATCH', credentials: 'include' });
      if (res.ok) { showToast('✅ 已發布，通知信件寄送中', 'success'); await loadArticles(); }
      else showToast('發布失敗', 'error');
    } catch (e) { showToast('網路錯誤', 'error'); }
  }

  // ── 切換置頂 ─────────────────────────────────────────────
  async function togglePin(id, pin) {
    const a = allArticles.find(x => x.articleId === id);
    if (!a) return;
    try {
      const res = await fetch(`${API}/update/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          title: a.title, content: a.content, category: a.category,
          status: a.status, imageUrl: a.imageUrl, isPinned: pin,
          admin: { adminId: ADMIN_ID } // ✅ 動態取得
        })
      });
      if (res.ok) {
        showToast(pin ? '📌 已置頂' : '已取消置頂', 'success');
        await loadArticles();
      } else showToast('操作失敗', 'error');
    } catch (e) { showToast('網路錯誤', 'error'); }
  }

  // ── 刪除 ─────────────────────────────────────────────────
  async function deleteArticle(id) {
    if (!confirm(`確定要刪除文章 #${id}？此操作無法復原。`)) return;
    try {
      const res = await fetch(`${API}/delete/${id}`, { method: 'DELETE', credentials: 'include' });
      if (res.ok) { showToast('已刪除', 'success'); await loadArticles(); }
      else showToast('刪除失敗', 'error');
    } catch (e) { showToast('網路錯誤', 'error'); }
  }

  // ── 工具函式 ─────────────────────────────────────────────
  function statusLabel(s) {
    return { published: '已發布', draft: '草稿', archived: '已下架' }[s] || s;
  }
  function formatDate(str) {
    if (!str) return '—';
    return str.replace('T', ' ').substring(0, 16);
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
