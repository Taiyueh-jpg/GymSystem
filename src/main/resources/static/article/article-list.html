<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>最新消息 — GymSystem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #ffffff;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar（對齊首頁樣式）───────────────────────────── */
    .navbar {
      background: #2d2d2d;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #fff;
      font-size: 18px; font-weight: 700;
    }
    .navbar-brand img { height: 28px; }
    .navbar-right {
      display: flex; align-items: center; gap: 16px;
    }
    .nav-link {
      color: #ccc; text-decoration: none; font-size: 14px;
      transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .btn-login {
      background: transparent; border: 1px solid #fff;
      color: #fff; padding: 6px 18px; border-radius: 4px;
      font-size: 14px; cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .btn-login:hover { background: rgba(255,255,255,0.1); }

    /* ── Page Header ────────────────────────────────────── */
    .page-header {
      background: #2d2d2d;
      padding: 40px 32px 32px;
      border-bottom: 1px solid #3a3a3a;
    }
    .page-header h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 6px;
    }
    .page-header p {
      color: #aaa; font-size: 14px;
    }

    /* ── Filter Bar ─────────────────────────────────────── */
    .filter-bar {
      background: #222; border-bottom: 1px solid #333;
      padding: 16px 32px; display: flex; gap: 10px; flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent; border: 1px solid #444;
      color: #aaa; font-size: 13px; padding: 7px 18px;
      border-radius: 4px; cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #666; color: #fff; }
    .filter-btn.active {
      background: #2979ff; border-color: #2979ff;
      color: #fff;
    }

    /* ── Main Content ───────────────────────────────────── */
    .content {
      max-width: 1100px; margin: 0 auto;
      padding: 32px;
    }

    /* 置頂文章大卡 */
    .pinned-card {
      background: #2d2d2d;
      border: 1px solid #3a3a3a;
      border-left: 4px solid #2979ff;
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex; gap: 24px; align-items: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .pinned-card:hover { background: #333; transform: translateY(-2px); }
    .pinned-card .card-img {
      width: 160px; height: 110px; flex-shrink: 0;
      border-radius: 6px; overflow: hidden;
      background: #3a3a3a;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .pinned-card .card-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .pinned-badge {
      display: inline-block;
      background: #2979ff; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 10px; border-radius: 3px;
      margin-bottom: 8px; letter-spacing: 1px;
    }
    .card-category {
      font-size: 12px; color: #aaa;
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .card-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 8px; line-height: 1.4;
    }
    .card-excerpt {
      font-size: 13px; color: #999; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta {
      margin-top: 12px; font-size: 12px; color: #777;
      display: flex; gap: 16px;
    }

    /* 文章列表區塊標題 */
    .section-label {
      font-size: 12px; color: #777; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid #333;
    }

    /* 一般文章格 */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .article-card {
      background: #2d2d2d; border: 1px solid #3a3a3a;
      border-radius: 8px; overflow: hidden;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .article-card:hover { background: #333; transform: translateY(-3px); }
    .article-card .card-img {
      width: 100%; height: 150px;
      background: #3a3a3a;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; overflow: hidden;
    }
    .article-card .card-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .article-card .card-body { padding: 18px; }
    .article-card .card-title { font-size: 15px; }

    /* Loading / Empty */
    .state-box {
      text-align: center; padding: 60px 20px; color: #666;
      grid-column: 1 / -1;
    }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid #333; border-top-color: #2979ff;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center; padding: 28px;
      color: #555; font-size: 12px; margin-top: 60px;
      border-top: 1px solid #2a2a2a;
    }

    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .content { padding: 20px 16px; }
      .pinned-card { flex-direction: column; }
      .pinned-card .card-img { width: 100%; height: 140px; }
      .filter-bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar">
  <a href="../index.html" class="navbar-brand">
    🏋️ GymSystem
  </a>
  <div class="navbar-right">
    <a href="../index.html" class="nav-link">首頁</a>
    <a href="article-list.html" class="nav-link active">最新消息</a>
    <a href="../faq/faq.html" class="nav-link">常見問答</a>
    <a href="../contact/contact.html" class="nav-link">聯絡我們</a>
    <a href="../member/login.html" class="btn-login">登入 / 註冊</a>
  </div>
</nav>

<!-- ── Page Header ────────────────────────────────────────── -->
<div class="page-header">
  <h1>最新消息</h1>
  <p>掌握最新優惠活動與課程公告</p>
</div>

<!-- ── Filter Bar ─────────────────────────────────────────── -->
<div class="filter-bar">
  <button class="filter-btn active" data-category="">全部</button>
  <button class="filter-btn" data-category="優惠資訊">優惠資訊</button>
  <button class="filter-btn" data-category="課程公告">課程公告</button>
  <button class="filter-btn" data-category="系統公告">系統公告</button>
</div>

<!-- ── Content ────────────────────────────────────────────── -->
<div class="content">
  <!-- 置頂區 -->
  <div id="pinned-zone"></div>

  <!-- 一般文章 -->
  <div id="normal-section" style="display:none">
    <div class="section-label">所有公告</div>
  </div>
  <div class="article-grid" id="article-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>載入中...</p>
    </div>
  </div>
</div>

<footer>
  © 2026 GymSystem 健身房系統 All Rights Reserved
</footer>

<script>
  const API_BASE = 'http://localhost:8080';
  let allArticles = [];

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function categoryIcon(cat) {
    const map = { '優惠資訊': '🎁', '課程公告': '🏋️', '系統公告': '📢' };
    return map[cat] || '📝';
  }

  // Cloudinary 網址直接用，舊本機路徑才補 API_BASE
  function resolveImageUrl(url) {
    if (!url) return null;
    return url.startsWith('http') ? url : `${API_BASE}/${url}`;
  }

  function renderPinned(a) {
    const imgSrc = resolveImageUrl(a.imageUrl);
    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" alt="${a.title}" onerror="this.parentElement.innerHTML='${categoryIcon(a.category)}'">`
      : categoryIcon(a.category);
    return `
      <div class="pinned-card" onclick="goDetail(${a.articleId})">
        <div class="card-img">${imgHtml}</div>
        <div style="flex:1;min-width:0">
          <div class="pinned-badge">📌 置頂公告</div>
          <div class="card-category">${a.category || '公告'}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-excerpt">${a.content}</div>
          <div class="card-meta">
            <span>📅 ${formatDate(a.publishedAt)}</span>
            <span>✍️ ${a.admin?.name || 'GymSystem'}</span>
          </div>
        </div>
      </div>`;
  }

  function renderCard(a) {
    const imgSrc = resolveImageUrl(a.imageUrl);
    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" alt="${a.title}" onerror="this.style.display='none'">`
      : categoryIcon(a.category);
    return `
      <div class="article-card" onclick="goDetail(${a.articleId})">
        <div class="card-img">${imgHtml}</div>
        <div class="card-body">
          <div class="card-category">${a.category || '公告'}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-excerpt">${a.content}</div>
          <div class="card-meta">
            <span>📅 ${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </div>`;
  }

  function renderAll(articles) {
    const pinned = articles.filter(a => a.isPinned);
    const normal = articles.filter(a => !a.isPinned);

    document.getElementById('pinned-zone').innerHTML = pinned.map(renderPinned).join('');

    const normalSection = document.getElementById('normal-section');
    const grid = document.getElementById('article-grid');

    if (articles.length === 0) {
      normalSection.style.display = 'none';
      grid.innerHTML = `<div class="state-box"><p>目前沒有文章</p></div>`;
    } else {
      normalSection.style.display = normal.length > 0 ? 'block' : 'none';
      grid.innerHTML = normal.length > 0
        ? normal.map(renderCard).join('')
        : '';
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.category;
      renderAll(cat ? allArticles.filter(a => a.category === cat) : allArticles);
    });
  });

  function goDetail(id) {
    window.location.href = `article-detail.html?id=${id}`;
  }

  async function loadArticles() {
    try {
      const res = await fetch(`${API_BASE}/api/articles/list`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allArticles = await res.json();
      renderAll(allArticles);
    } catch (err) {
      document.getElementById('article-grid').innerHTML =
        `<div class="state-box"><p>⚠️ 載入失敗，請確認後端已啟動<br><small style="color:#555">${err.message}</small></p></div>`;
    }
  }

  loadArticles();
</script>
</body>
</html>
