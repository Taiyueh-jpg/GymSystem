<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>

<body class="bg-gym-image d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container py-4" ng-controller="RegisterCtrl" ng-cloak>
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card service-card p-4 shadow-lg rounded-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">建立帳號</h2>
                        <p class="text-light mb-0">註冊後即可登入 GymSystem</p>
                    </div>

                    <ul class="nav nav-pills nav-justified mb-4">
                        <li class="nav-item">
                            <a class="nav-link"
                               href="#"
                               ng-class="{'active': registerType === 'member'}"
                               ng-click="setRegisterType('member')">
                                會員註冊
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn-outline-secondary text-white"
                               href="#"
                               ng-class="{'active bg-secondary': registerType === 'staff'}"
                               ng-click="setRegisterType('staff')">
                                教練 / 管理者註冊
                            </a>
                        </li>
                    </ul>

                    <form ng-if="registerType === 'member'" ng-submit="registerMember()">
                        <div class="mb-3">
                            <label class="form-label text-light">姓名</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" ng-model="memberData.name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">電子信箱</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" ng-model="memberData.email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">密碼</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" ng-model="memberData.password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">手機</label>
                            <input type="tel" class="form-control bg-dark text-white border-secondary" ng-model="memberData.mobile">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">地址</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" ng-model="memberData.address">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">生日</label>
                            <input type="date" class="form-control bg-dark text-white border-secondary" ng-model="memberData.birthday">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" ng-disabled="processing">
                            {{ processing ? '註冊中...' : '註冊會員' }}
                        </button>
                    </form>

                    <form ng-if="registerType === 'staff'" ng-submit="registerStaff()">
                        <div class="alert alert-warning small">
                            此區使用現有員工建立 API，Demo 可用；正式系統建議改由後台管理員新增教練或管理者帳號。
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">姓名</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" ng-model="staffData.name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">電子信箱</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" ng-model="staffData.email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">密碼</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" ng-model="staffData.password" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">角色</label>
                            <select class="form-select bg-dark text-white border-secondary" ng-model="staffData.role" required>
                                <option value="coach">教練</option>
                                <option value="admin">管理者</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-secondary w-100 py-2 fw-bold" ng-disabled="processing">
                            {{ processing ? '建立中...' : '建立教練 / 管理者帳號' }}
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-light">已經有帳號？</span>
                        <a href="login.html" class="text-primary text-decoration-none fw-bold">回登入頁</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
