<!DOCTYPE html>
<html lang="zh-TW" ng-app="GymApp">
<head>
    <meta charset="UTF-8">
    <title>註冊 - GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="bg-gym-image d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 40px 0;">
    <div class="container" ng-controller="RegisterCtrl" ng-cloak>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card service-card p-4 shadow-lg rounded-4">
                    <div class="text-center mb-3">
                        <h2 class="fw-bold text-white">加入 GymSystem</h2>
                        <p class="text-light">開啟你的專屬健身旅程</p>
                    </div>

                    <div class="alert alert-warning text-center fw-bold py-2 mb-4" role="alert" style="background-color: rgba(255, 193, 7, 0.9); border: none; color: #333;">
                        🎁 填寫完整資料，註冊會員即享「商城購物 95 折」專屬優惠！
                    </div>

                    <form ng-submit="doRegister()">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-light">姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" ng-model="regData.name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-light">電子信箱 <span class="text-danger">*</span></label>
                                <input type="email" class="form-control bg-dark text-white border-secondary" ng-model="regData.email" required>
                            </div>
                        </div>

                        <div class="mb-3" ng-init="showPassword = false">
                            <label class="form-label text-light">密碼 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="{{ showPassword ? 'text' : 'password' }}" class="form-control bg-dark text-white border-secondary" ng-model="regData.password" required>
                                <button class="btn btn-secondary border-secondary" type="button" ng-click="showPassword = !showPassword" title="顯示/隱藏密碼">
                                    {{ showPassword ? '🙈' : '👁️' }}
                                </button>
                            </div>
                        </div>

                        <hr class="border-secondary my-4">
                        <p class="text-info small mb-3">為確保您的專屬優惠與權益，建議您完整填寫以下資料：</p>

                        <div class="mb-3">
                            <label class="form-label text-light">手機號碼</label>
                            <!-- 💡 專家優化 1：限制輸入10碼，且利用 oninput 正則表達式瞬間過濾掉所有非數字的字元 -->
                            <input type="tel" 
                                   class="form-control bg-dark text-white border-secondary" 
                                   ng-model="regData.mobile" 
                                   maxlength="10" 
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   placeholder="例如：0912345678">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">聯絡地址</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" ng-model="regData.address" placeholder="方便日後商品宅配到府">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-light">生日</label>
                            <!-- 💡 專家優化 2：加入 onclick="this.showPicker()"，點擊欄位任何地方都會強制彈出日曆選單，防呆滿分 -->
                            <input type="date" 
                                   class="form-control bg-dark text-white border-secondary" 
                                   ng-model="regData.birthday"
                                   onclick="this.showPicker()">
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold fs-5">立即註冊領取優惠</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="text-light">已經有帳號了？</span>
                        <a href="login.html" class="text-primary text-decoration-none fw-bold">返回登入</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
