# 伺服器 Port 設定
server.port=8080

# ===============================
# 1. MySQL 資料庫連線設定
# ===============================
# 指向你的 gymsystem 資料庫，並設定台灣時區與 UTF-8 編碼避免亂碼
spring.datasource.url=jdbc:mysql://localhost:3306/gymsystem?serverTimezone=Asia/Taipei&characterEncoding=utf-8&useSSL=false
spring.datasource.username=root
# ↓↓↓ 請把這裡的密碼改成你自己的 MySQL 密碼 (例如 123456 或 root) ↓↓↓
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 2. JPA / Hibernate 進階設定
# ===============================
# update: 啟動時自動檢查並更新資料表結構，不會刪除原有資料
spring.jpa.hibernate.ddl-auto=update
# true: 在 Console 印出底層執行的 SQL 語句，這是我們除錯的好幫手
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
