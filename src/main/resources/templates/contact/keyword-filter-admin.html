<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>關鍵字過濾管理 - GymSystem Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --nav: #2d2d2d;
      --card: #2a2a2a;
      --border: #3a3a3a;
      --blue: #2979ff;
      --blue-hover: #5393ff;
      --text: #e8e8e8;
      --text-muted: #888;
      --danger: #ff4444;
      --warn: #ff9800;
      --success: #4caf50;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: var(--nav);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; padding: 6px 14px;
      border-radius: 6px; font-size: 14px; transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: var(--border); color: var(--text);
    }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    /* ── Add Form Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    .form-group label { font-size: 13px; color: var(--text-muted); }
    .form-group input, .form-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--blue);
    }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ── Filters Bar ── */
    .filters-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
    }
    .filters-bar input {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 8px;
      font-size: 14px; font-family: inherit; flex: 1; min-width: 200px;
    }
    .filter-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      font-size: 13px; font-family: inherit; transition: all .2s;
    }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .filter-btn:hover:not(.active) { background: var(--border); color: var(--text); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--bg); padding: 12px 16px;
      text-align: left; font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 14px 16px; font-size: 14px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-block { background: rgba(255,68,68,.15); color: var(--danger); }
    .badge-flag  { background: rgba(255,152,0,.15);  color: var(--warn); }
    .badge-active   { background: rgba(76,175,80,.15); color: var(--success); }
    .badge-inactive { background: rgba(136,136,136,.15); color: var(--text-muted); }

    /* ── Actions ── */
    .actions { display: flex; gap: 6px; }

    /* ── Empty / Loading ── */
    .empty-state {
      text-align: center; padding: 60px 0;
      color: var(--text-muted); font-size: 14px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 14px 22px; border-radius: 10px;
      font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.4);
      opacity: 0; transform: translateY(12px);
      transition: all .3s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-left: 4px solid var(--success); }
    #toast.error   { border-left: 4px solid var(--danger); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 32px; width: 100%; max-width: 420px;
      transform: scale(.96); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-size: 18px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="index.html" class="nav-logo">🏋️ GymSystem Admin</a>
  <div class="nav-links">
    <a href="contact-admin.html">客服留言</a>
    <a href="keyword-filter-admin.html" class="active">關鍵字過濾</a>
    <a href="article-admin.html">文章管理</a>
  </div>
</nav>

<div class="container">
  <h1>🔍 關鍵字過濾管理</h1>
  <p class="subtitle">管理 block（直接擋回）與 flag（標記審核）關鍵字</p>

  <!-- Add Form -->
  <div class="card">
    <h2>新增關鍵字</h2>
    <div class="form-row">
      <div class="form-group" style="flex:2;">
        <label>關鍵字</label>
        <input type="text" id="input-keyword" placeholder="輸入要過濾的關鍵字..." />
      </div>
      <div class="form-group">
        <label>類型</label>
        <select id="input-type">
          <option value="block">🚫 block（直接擋回）</option>
          <option value="flag">⚠️ flag（標記審核）</option>
        </select>
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="input-status">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="addKeyword()">新增</button>
    </div>
  </div>

  <!-- Filters + Table -->
  <div class="card">
    <div class="filters-bar">
      <input type="text" id="search-input" placeholder="搜尋關鍵字..." oninput="onSearch()" />
      <button class="filter-btn active" data-type="all" onclick="filterType(this, 'all')">全部</button>
      <button class="filter-btn" data-type="block" onclick="filterType(this, 'block')">🚫 block</button>
      <button class="filter-btn" data-type="flag" onclick="filterType(this, 'flag')">⚠️ flag</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>關鍵字</th>
            <th>類型</th>
            <th>狀態</th>
            <th>建立時間</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="keyword-tbody">
          <tr><td colspan="5"><div class="empty-state">載入中...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ 編輯關鍵字</h3>
    <input type="hidden" id="edit-id" />
    <div class="form-group" style="margin-bottom:16px;">
      <label>關鍵字</label>
      <input type="text" id="edit-keyword" />
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>類型</label>
      <select id="edit-type">
        <option value="block">🚫 block（直接擋回）</option>
        <option value="flag">⚠️ flag（標記審核）</option>
      </select>
    </div>
    <div class="form-group">
      <label>狀態</label>
      <select id="edit-status">
        <option value="active">active</option>
        <option value="inactive">inactive</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/admin/keyword-filter';
  let currentType = 'all';
  let searchTimeout = null;

  // ── 載入列表 ──
  async function loadKeywords(type, search) {
    let url = API;
    const params = new URLSearchParams();
    if (type && type !== 'all') params.append('type', type);
    if (search && search.trim()) params.append('search', search.trim());
    if ([...params].length) url += '?' + params.toString();

    try {
      const res = await fetch(url);
      const data = await res.json();
      renderTable(data);
    } catch (e) {
      showToast('載入失敗', 'error');
    }
  }

  function renderTable(list) {
    const tbody = document.getElementById('keyword-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">尚無關鍵字</div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(kf => `
      <tr>
        <td><strong>${escHtml(kf.keyword)}</strong></td>
        <td>
          ${kf.type === 'block'
            ? '<span class="badge badge-block">🚫 block</span>'
            : '<span class="badge badge-flag">⚠️ flag</span>'}
        </td>
        <td>
          ${kf.status === 'active'
            ? '<span class="badge badge-active">● active</span>'
            : '<span class="badge badge-inactive">○ inactive</span>'}
        </td>
        <td style="color:var(--text-muted);font-size:13px;">${formatDate(kf.createdAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${kf.keywordId},'${escHtml(kf.keyword)}','${kf.type}','${kf.status}')">編輯</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleStatus(${kf.keywordId})">
              ${kf.status === 'active' ? '停用' : '啟用'}
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteKeyword(${kf.keywordId})">刪除</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── 新增 ──
  async function addKeyword() {
    const keyword = document.getElementById('input-keyword').value.trim();
    const type = document.getElementById('input-type').value;
    const status = document.getElementById('input-status').value;
    if (!keyword) { showToast('請輸入關鍵字', 'error'); return; }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, type, status })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || '新增失敗', 'error'); return; }
      document.getElementById('input-keyword').value = '';
      showToast('✅ 新增成功', 'success');
      loadKeywords(currentType, document.getElementById('search-input').value);
    } catch (e) { showToast('新增失敗', 'error'); }
  }

  // ── 切換狀態 ──
  async function toggleStatus(id) {
    try {
      await fetch(`${API}/${id}/toggle`, { method: 'PATCH' });
      showToast('狀態已更新', 'success');
      loadKeywords(currentType, document.getElementById('search-input').value);
    } catch (e) { showToast('操作失敗', 'error'); }
  }

  // ── 刪除 ──
  async function deleteKeyword(id) {
    if (!confirm('確定要刪除這個關鍵字嗎？')) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      showToast('已刪除', 'success');
      loadKeywords(currentType, document.getElementById('search-input').value);
    } catch (e) { showToast('刪除失敗', 'error'); }
  }

  // ── Edit Modal ──
  function openEdit(id, keyword, type, status) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-keyword').value = keyword;
    document.getElementById('edit-type').value = type;
    document.getElementById('edit-status').value = status;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const keyword = document.getElementById('edit-keyword').value.trim();
    const type = document.getElementById('edit-type').value;
    const status = document.getElementById('edit-status').value;
    if (!keyword) { showToast('請輸入關鍵字', 'error'); return; }

    try {
      const res = await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, type, status })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || '更新失敗', 'error'); return; }
      closeModal();
      showToast('✅ 更新成功', 'success');
      loadKeywords(currentType, document.getElementById('search-input').value);
    } catch (e) { showToast('更新失敗', 'error'); }
  }

  // ── Filters ──
  function filterType(btn, type) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = type;
    loadKeywords(type, document.getElementById('search-input').value);
  }

  function onSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      loadKeywords(currentType, document.getElementById('search-input').value);
    }, 350);
  }

  // ── Utils ──
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 2800);
  }

  function formatDate(dt) {
    if (!dt) return '-';
    return new Date(dt).toLocaleDateString('zh-TW', {
      year: 'numeric', month: '2-digit', day: '2-digit'
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 點擊 modal 外側關閉 ──
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Init ──
  loadKeywords('all');
</script>
</body>
</html>
