<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSystem | 全球頂級健身房與商城</title>
    <!-- 引入 Bootstrap 5 CSS (由同學 A 統籌全站共用版型) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 簡單的首頁主視覺背景設定 */
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop') center/cover;
            color: white;
            padding: 100px 0;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- ================= 共用導覽列 (Navbar) ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏋️ GymSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <!-- 預留給同學 B 的課程總覽連結 -->
                    <li class="nav-item"><a class="nav-link" href="/course/list">課程預約</a></li>
                    <!-- 預留給同學 D 的商城總覽連結 -->
                    <li class="nav-item"><a class="nav-link" href="/product/mall">周邊商城</a></li>
                </ul>
                <ul class="navbar-nav">
                    <!-- Thymeleaf 邏輯：如果 Session 中沒有 loginMember (未登入)，顯示登入註冊按鈕 -->
                    <li class="nav-item" th:if="${session.loginMember == null}">
                        <a class="nav-link btn btn-outline-light btn-sm px-3" href="/member/login">登入 / 註冊</a>
                    </li>
                    
                    <!-- Thymeleaf 邏輯：如果 Session 中有 loginMember (已登入)，顯示會員姓名與下拉選單 -->
                    <li class="nav-item dropdown" th:if="${session.loginMember != null}">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span th:text="${session.loginMember.name} + '，您好'">會員您好</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="/member/profile">會員中心</a></li>
                            <!-- 預留給同學 C 與 E 的歷史紀錄連結 -->
                            <li><a class="dropdown-item" href="/order/history">歷史訂單與預約</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item text-danger" onclick="logout()">登出系統</button></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ================= 首頁主視覺內容 ================= -->
    <div class="container">
        <div class="hero-section text-center shadow">
            <h1 class="display-4 fw-bold mb-4">突破極限，成就更好的自己</h1>
            <p class="fs-4 col-md-8 mx-auto mb-5">
                歡迎體驗我們為您打造的專屬健身生態圈。<br>
                立即預約專業 1對1 教練、揮灑汗水的有氧團課，或選購最高品質的健身補劑。
            </p>
            <a href="/course/list" class="btn btn-primary btn-lg px-5 me-md-3">立即預約</a>
            <a href="/product/mall" class="btn btn-outline-light btn-lg px-5">逛逛商城</a>
        </div>
    </div>

    <div class="container mt-5 text-center text-muted">
        <p>&copy; 2026 GymSystem 健身房系統開發團隊</p>
    </div>

    <!-- ================= Bootstrap 5 JS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ================= 登出功能的 AJAX 腳本 ================= -->
    <script>
        function logout() {
            if(confirm('確定要登出嗎？')) {
                // 呼叫我們剛剛在 MembersController 寫好的登出 API
                fetch('/api/members/logout', { method: 'POST' })
                .then(response => {
                    if(response.ok) {
                        alert('登出成功！');
                        window.location.href = '/'; // 重新整理首頁
                    }
                });
            }
        }
    </script>
</body>
</html>
