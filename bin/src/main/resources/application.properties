spring.application.name=gymsystem

# ── 1. MySQL 資料庫連線 ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/gymsystem?serverTimezone=Asia/Taipei&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── 2. JPA / Hibernate ──────────────────────────────────────
# 【重要】改成 none：資料表已經用 SQL 建好，不讓 Hibernate 亂動結構
# update 在欄位改名時不會自動刪舊欄位，反而容易造成 mapping 錯誤
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── 3. Jackson 時間序列化 ────────────────────────────────────
# 沒有這兩行，LocalDateTime 會被序列化成陣列 [2026,4,9,0,30,46]
# 加上後前端會收到正常字串 "2026-04-09T00:30:46"
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Taipei

# ── 4. Thymeleaf（原有保留）─────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── 5. 檔案上傳限制 ──────────────────────────────────────────
# max-file-size：單一檔案上限（這裡設 5MB 對應圖片附件規格）
# max-request-size：整個 request 上限（3 張圖 × 5MB = 15MB，設 20MB 留緩衝）
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# ── Gmail SMTP 基本設定（帳密在 secret 檔）──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
 
# ── Async（非同步寄信） ──
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
 
# ── 載入機密設定（application-secret.properties）──
spring.profiles.include=secret