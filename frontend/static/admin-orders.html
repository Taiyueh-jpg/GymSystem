<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSystem 後台管理 - 訂單戰情室</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-dark bg-secondary mb-4">
        <span class="navbar-brand mb-0 h1">🛠️ GymSystem 後台管理系統</span>
        <div>
            <span id="admin-name" class="mr-3 text-warning">未登入</span>
            <button class="btn btn-sm btn-outline-light" onclick="quickLogin()">模擬管理員登入</button>
        </div>
    </nav>

    <div class="container-fluid px-5">
        <h2 class="mb-4">📦 全站訂單總覽</h2>
        
        <div class="card text-dark">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="thead-dark">
                        <tr>
                            <th>訂單編號</th>
                            <th>會員 ID</th>
                            <th>下單時間</th>
                            <th>總金額</th>
                            <th>付款方式</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-order-list">
                        <tr>
                            <td colspan="7" class="text-center py-4">
                                <span class="text-muted">請先點擊右上角「模擬管理員登入」取得通行證！</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 模擬登入功能 (幫助我們在瀏覽器拿到 Session 通行證) ---
        function quickLogin() {
            // 使用您剛剛在 Postman 註冊的測試帳號
            const loginData = {
                email: "test@gmail.com",
                password: "123456"
            };

            fetch('/api/members/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('admin-name').innerText = "管理員：滷蛋大總管";
                    alert("登入成功！已取得通行證，開始載入全站訂單！");
                    fetchAllOrders(); // 登入成功後，立刻去抓訂單
                } else {
                    alert("登入失敗，請確認資料庫是否有 test@gmail.com 這個帳號！");
                }
            });
        }

        // --- 2. 抓取全公司訂單 (呼叫您的 /api/orders/all) ---
        function fetchAllOrders() {
            fetch('/api/orders/all')
                .then(res => {
                    if(res.status === 401) throw new Error("401 未授權，被保全擋下了！");
                    return res.json();
                })
                .then(orders => {
                    const orderList = document.getElementById('admin-order-list');
                    orderList.innerHTML = ''; 

                    if(orders.length === 0) {
                        orderList.innerHTML = '<tr><td colspan="7" class="text-center">目前沒有任何訂單</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        let statusHtml = order.status;
                        let actionBtn = '';

                        // 狀態徽章與操作按鈕邏輯
                        if (order.status === 'paid') {
                            statusHtml = '<span class="badge badge-success">已付款 (待出貨)</span>';
                            // 呼叫出貨的 API
                            actionBtn = `<button class="btn btn-sm btn-primary" onclick="shipOrder(${order.orderId})">🚀 執行出貨</button>`;
                        } else if (order.status === 'shipped') {
                            statusHtml = '<span class="badge badge-info">已出貨</span>';
                            actionBtn = `<button class="btn btn-sm btn-secondary" disabled>已出貨</button>`;
                        }

                        let formattedDate = order.orderDate ? order.orderDate.substring(0, 19).replace('T', ' ') : '';

                        const rowHtml = `
                            <tr>
                                <td class="font-weight-bold"># ${order.orderId}</td>
                                <td>👤 會員 ${order.memberId}</td>
                                <td>${formattedDate}</td>
                                <td class="text-danger font-weight-bold">NT$ ${order.totalAmount}</td>
                                <td>${order.paymentType}</td>
                                <td>${statusHtml}</td>
                                <td>${actionBtn}</td>
                            </tr>
                        `;
                        orderList.innerHTML += rowHtml;
                    });
                })
                .catch(err => {
                    alert(err.message + " 請先點擊右上角登入！");
                });
        }

        // --- 3. 執行出貨功能 (呼叫您的 PUT API) ---
        function shipOrder(orderId) {
            if(!confirm(`確定要將訂單 # ${orderId} 設為已出貨嗎？`)) return;

            fetch(`/api/orders/${orderId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'shipped' })
            })
            .then(res => {
                if(res.ok) {
                    alert(`訂單 # ${orderId} 已成功出貨！`);
                    fetchAllOrders(); // 出貨成功後，重新整理表格
                } else {
                    alert("出貨失敗！");
                }
            });
        }
    </script>
</body>
</html>
