<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入與註冊 | GymSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* 把背景換成稍微深一點、帶點藍灰調的顏色 */
            background-color: #e2e8f0; 
        }
        .auth-card {
            max-width: 450px;
            margin: 50px auto;
            border-radius: 15px;
            background-color: #ffffff;
            /* 魔法在這裡：把陰影加深、加廣，營造懸浮的立體感 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            /* 加上極淡的邊框讓邊緣更銳利 */
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏋️ GymSystem</a>
        </div>
    </nav>

    <div class="container">
        <div class="card auth-card border-0">
            <div class="card-body p-5">
                
                <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">會員登入</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">註冊新帳號</button>
                    </li>
                </ul>

                <div class="tab-content" id="pills-tabContent">
                    
                    <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                        <form action="/api/members/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted small">電子信箱</label>
                                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">密碼</label>
                                <input type="password" name="password" class="form-control" placeholder="請輸入密碼" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2">登入系統</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="pills-register" role="tabpanel">
                        <form action="/api/members/register" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted small">真實姓名</label>
                                <input type="text" name="name" class="form-control" placeholder="請輸入姓名" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">電子信箱</label>
                                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">設定密碼</label>
                                <input type="password" name="password" class="form-control" placeholder="請設定 6 碼以上密碼" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">手機號碼</label>
                                <input type="tel" name="phone" class="form-control" placeholder="09xx-xxxxxx" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2">立即註冊</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
