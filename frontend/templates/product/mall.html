<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSystem 線上商城</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <span class="navbar-brand mb-0 h1">🏋️ GymSystem 商城</span>
        <div class="form-inline">
            <span class="text-white mr-3">購物車: <span id="cart-count" class="badge badge-warning">0</span> 件</span>
            <button class="btn btn-success" onclick="checkout()">前往結帳</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">熱銷商品</h2>
        <div class="row" id="product-list">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="sr-only">載入中...</span>
                </div>
                <p>商品載入中...</p>
            </div>
        </div>
    </div>

    <script>
        // 宣告一個全域變數來存放購物車內容 (簡單陣列)
        let cart = [];

        window.onload = function() {
            fetchProducts();
            updateCartUI(); // 網頁載入時更新購物車數字
        };

        function fetchProducts() {
            fetch('/api/products')
                .then(response => response.json())
                .then(data => {
                    const productList = document.getElementById('product-list');
                    productList.innerHTML = '';

                    data.forEach(product => {
                        const imgUrl = product.imageBase64 ? product.imageBase64 : 'https://via.placeholder.com/300x200?text=No+Image';
                        
                        const cardHtml = `
                            <div class="col-md-4 mb-4">
                                <div class="card h-100 shadow-sm">
                                    <img src="${imgUrl}" class="card-img-top" alt="${product.pname}">
                                    <div class="card-body d-flex flex-column">
                                        <h5 class="card-title">${product.pname}</h5>
                                        <p class="card-text text-danger font-weight-bold">NT$ ${product.price}</p>
                                        <button class="btn btn-primary mt-auto" onclick="addToCart(${product.productId}, '${product.pname}', ${product.price})">加入購物車</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        productList.innerHTML += cardHtml;
                    });
                })
                .catch(error => {
                    console.error('抓取商品失敗:', error);
                    document.getElementById('product-list').innerHTML = '<div class="alert alert-danger">載入商品失敗。</div>';
                });
        }

        // --- 新增：加入購物車功能 ---
        function addToCart(id, name, price) {
            // 檢查購物車裡是不是已經有這個商品了
            const existingItem = cart.find(item => item.productId === id);
            
            if (existingItem) {
                existingItem.quantity += 1; // 如果有，數量 +1
            } else {
                // 如果沒有，新增一個物件到陣列裡
                cart.push({
                    productId: id,
                    pname: name,
                    unitPrice: price,
                    quantity: 1
                });
            }
            updateCartUI();
            alert(`已將 ${name} 加入購物車！`);
        }

        // --- 新增：更新購物車介面 ---
        function updateCartUI() {
            // 計算總件數
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalCount;
        }

        // --- 新增：結帳功能 (準備呼叫您的 Checkout API) ---
        function checkout() {
            if (cart.length === 0) {
                alert("購物車是空的喔！先去逛逛吧。");
                return;
            }

            // 1. 計算總金額
            let totalAmount = 0;
            cart.forEach(item => {
                totalAmount += (item.unitPrice * item.quantity);
            });

            // 2. 準備要傳給後端的 JSON 格式 (必須符合您的 CheckoutRequest 結構)
            const requestBody = {
                porder: {
                    memberId: 1, // 暫時寫死會員 1 號
                    deliveryMethod: "home_delivery",
                    paymentType: "credit_card",
                    totalAmount: totalAmount
                },
                details: cart.map(item => ({
                    productId: item.productId,
                    quantity: item.quantity,
                    unitPrice: item.unitPrice
                }))
            };

            // 3. 使用 fetch 呼叫您的 Checkout API
            fetch('/api/orders/checkout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                }
                throw new Error('結帳失敗');
            })
            .then(data => {
                alert(`結帳成功！訂單編號：${data.orderId}`);
                cart = []; // 清空購物車
                updateCartUI();
            })
            .catch(error => {
                console.error('Error:', error);
                alert("結帳發生錯誤，請稍後再試。");
            });
        }
    </script>
</body>
</html>
